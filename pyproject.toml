# Tool configuration for ruff and pyright. The up CLI handles building and
# packaging composition functions — this file is only for linting and
# type-checking.

[tool.ruff]
target-version = "py312"
# Match ruff format's default. The formatter won't produce lines longer than
# this, but string literals in deeply nested dicts can still exceed it.
line-length = 120

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort (import ordering)
    "N",      # pep8-naming
    "UP",     # pyupgrade (modern Python idioms)
    "A",      # flake8-builtins (shadowing builtins)
    "B",      # flake8-bugbear (common gotchas)
    "PL",     # pylint subset
    "SIM",    # flake8-simplify (simplifiable constructs)
    "RET",    # flake8-return (return statement issues)
    "ARG",    # flake8-unused-arguments
]

[tool.ruff.lint.pylint]
# Builder functions like helm_release use named parameters for clarity.
max-args = 8

[tool.ruff.lint.per-file-ignores]
# Generated models are not under our control.
".up/python/models/**" = ["ALL"]
# Dispatch-contract signatures intentionally have unused args so all
# wrap_<scheduler> functions share one signature.
"functions/compose-model-placement/scheduler.py" = ["ARG001"]
# `clusters` and `cls` document interface contracts even when unused today.
"functions/compose-model-deployment/scheduling.py" = ["ARG001"]
"functions/compose-model-placement/rendering.py" = ["ARG001"]

[tool.pyright]
pythonVersion = "3.12"
# Type-check the function code and shared library. Exclude generated models
# and the tests directory (up CLI's test runner has its own structure).
include = ["functions", "lib"]
exclude = [".up"]

[tool.pytest.ini_options]
# Unit tests for the *pure* logic of composition functions: the federation
# matcher, per-scheduler wrap, rendering helpers, capacity-adapter
# projections. These run without Crossplane / K8s and don't need #64's
# protos to be generated.
#
# Run with:
#   .venv-test/bin/python -m pytest tests/unit
testpaths = ["tests/unit"]
python_files = ["test_*.py"]
