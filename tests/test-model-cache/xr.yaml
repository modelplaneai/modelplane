apiVersion: modelplane.ai/v1alpha1
kind: ModelCache
metadata:
  name: llama-3-3-70b
  namespace: ml-team
spec:
  artifact:
    kind: Weights
    source:
      huggingFace:
        repo: meta-llama/Llama-3.3-70B-Instruct
        revision: main
  mount:
    path: /mnt/model
  storage:
    backend: PVC
    pvc:
      storageClassName: standard-rwx
      sizeGiB: 200
  clusterSelector:
    matchLabels:
      modelplane.ai/tier: production
  replication: AllMatchingClusters
