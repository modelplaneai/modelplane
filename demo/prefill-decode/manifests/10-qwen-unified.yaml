apiVersion: modelplane.ai/v1alpha1
kind: ModelDeployment
metadata:
  name: qwen-unified
  namespace: ml-team
  labels: { model: qwen }
spec:
  replicas: 2
  modelCacheRef: { name: qwen }
  serving: { mode: Unified }
  engines:
  - name: server
    members:
    - role: Standalone
      nodeSelector:
        devices:
        - name: gpu
          count: 1
          selectors:
          - cel: device.capacity["gpu.nvidia.com"].memory.compareTo(quantity("20Gi")) >= 0
      template:
        spec:
          containers:
          - name: engine
            image: docker.io/vllm/vllm-openai:v0.19.1-x86_64-cu130
            args: [/mnt/models, --served-model-name=qwen, --max-model-len=10240]
