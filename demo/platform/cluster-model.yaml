# A small model for demo purposes. Qwen 2.5 0.5B fits on a single L4 GPU.
apiVersion: modelplane.ai/v1alpha1
kind: ClusterModel
metadata:
  name: qwen-0.5b-vllm
  labels:
    modelplane.ai/family: qwen
    modelplane.ai/size: 0.5b
spec:
  model:
    name: Qwen/Qwen2.5-0.5B-Instruct
  source: HuggingFace
  huggingFace:
    repo: Qwen/Qwen2.5-0.5B-Instruct
  engine: vLLM
  vllm:
    image: vllm/vllm-openai:v0.7.3
  resources:
    vram: "2Gi"
    cpu: "3"
    memory: "10Gi"
