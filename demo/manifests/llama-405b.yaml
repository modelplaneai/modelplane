# Llama 3.1 405B — massive model. 810Gi VRAM. Needs multi-node H100s.
apiVersion: modelplane.ai/v1alpha1
kind: ClusterModel
metadata:
  name: llama-3-1-405b
  labels:
    modelplane.ai/family: llama
    modelplane.ai/size: 405b
spec:
  model:
    name: meta-llama/Llama-3.1-405B-Instruct
  source: HuggingFace
  huggingFace:
    repo: meta-llama/Llama-3.1-405B-Instruct
  resources:
    vram: "810Gi"
    cpu: "16"
    memory: "128Gi"
  serving:
    - name: vllm-kserve
      backend: KServe
      engine:
        name: vLLM
        image: vllm/vllm-openai:v0.7.3
