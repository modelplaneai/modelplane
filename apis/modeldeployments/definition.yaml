apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: modeldeployments.modelplane.ai
spec:
  group: modelplane.ai
  names:
    categories: [crossplane, modelplane]
    kind: ModelDeployment
    plural: modeldeployments
    shortNames: [md]
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    additionalPrinterColumns:
    - name: REPLICAS
      type: string
      jsonPath: .status.replicas.ready
    schema:
      openAPIV3Schema:
        type: object
        required: [spec]
        properties:
          spec:
            type: object
            required: [replicas, workers]
            properties:
              replicas:
                type: integer
                minimum: 1
                maximum: 10
                description: >-
                  How many ModelReplicas to fan out to. Each replica is a
                  complete serving instance scheduled to one InferenceCluster.
              clusterSelector:
                type: object
                description: >-
                  Optional label selector to filter InferenceClusters.
                  If omitted, all ready clusters are candidates.
                properties:
                  matchLabels:
                    type: object
                    additionalProperties:
                      type: string
              modelCacheRef:
                type: object
                required: [name]
                description: >-
                  Reference to a ModelCache in the same namespace.
                  Optional for single-node groups; required for any group
                  that spans multiple nodes (a Leader with one or more
                  Workers), since every pod in the gang mounts it.
                properties:
                  name:
                    type: string
                    description: ModelCache resource name in the same namespace.
                    minLength: 1
              workers:
                type: array
                description: >-
                  The shape of a ModelReplica's inference engines, as an array
                  of worker groups. A group is one serving unit: a Standalone
                  pod, or a gang of a Leader and one or more Workers
                  coordinating across nodes. Modelplane composes the whole array
                  once per ModelReplica; a group composes to a Deployment
                  (Standalone) or a LeaderWorkerSet (Leader/Worker), but the
                  workload kind is an implementation detail. Modelplane is
                  unopinionated about the engine: parallelism, quantization, and
                  KV transfer all live in the members' engine flags, written by
                  the user, never injected by Modelplane.
                minItems: 1
                maxItems: 8
                x-kubernetes-list-type: map
                x-kubernetes-list-map-keys: [name]
                items:
                  type: object
                  required: [name, members]
                  # A group is exactly one Standalone member, or one Leader and
                  # one or more Workers. No other combination of roles forms a
                  # valid serving unit.
                  x-kubernetes-validations:
                  - rule: >-
                      (self.members.size() == 1 && self.members[0].role == 'Standalone')
                      || (self.members.exists_one(m, m.role == 'Leader')
                          && self.members.exists(m, m.role == 'Worker')
                          && !self.members.exists(m, m.role == 'Standalone'))
                    message: >-
                      a group must be either a single Standalone member or one
                      Leader and one or more Workers
                  properties:
                    name:
                      type: string
                      description: >-
                        Identifies the group within the deployment. Becomes part
                        of the composed workload names, so it must be a DNS
                        label.
                      minLength: 1
                      maxLength: 63
                    replicas:
                      type: integer
                      description: >-
                        How many identical copies of this group to run per
                        ModelReplica. Maps to the composed Deployment's or
                        LeaderWorkerSet's replica count. Defaults to 1.
                      default: 1
                      minimum: 1
                      maximum: 64
                    members:
                      type: array
                      description: >-
                        The group's pods. Either a single Standalone member, or
                        one Leader and one or more Workers.
                      minItems: 1
                      maxItems: 2
                      x-kubernetes-list-type: atomic
                      items:
                        type: object
                        required: [nodeSelector, template]
                        # count is meaningful only for a Worker: a Standalone and
                        # a Leader are always exactly one pod.
                        x-kubernetes-validations:
                        - rule: "!has(self.count) || self.role == 'Worker'"
                          message: "count may only be set on a Worker member"
                        properties:
                          role:
                            type: string
                            description: >-
                              The member's role in the group. Standalone is a
                              lone pod; a Leader coordinates and serves while its
                              Workers join it. Defaults to Standalone.
                            enum: [Standalone, Leader, Worker]
                            default: Standalone
                          count:
                            type: integer
                            description: >-
                              Number of follower pods, for a Worker only. Each
                              follower is one pod on one node, so this is also
                              the number of follower nodes. Defaults to 1.
                              No schema default - the apiserver applies defaults
                              before CEL validation, so a default here would
                              inject count onto Standalone and Leader members
                              and trip the rule that forbids it.
                            minimum: 1
                            maximum: 63
                          nodeSelector:
                            type: object
                            description: >-
                              The per-node device request for this member's
                              engine pods: what devices each pod needs. The
                              scheduler matches it against a candidate pool's
                              InferenceClass devices (surfaced on InferenceCluster
                              status.gpuPools) and places the group on a pool that
                              satisfies every member. claim: DRA requests also
                              become DeviceRequests in the ResourceClaim the
                              serving pods bind GPUs through. At least one request
                              must resolve to a claimable (claim: DRA) device; a
                              member that matches only synthetic devices leaves
                              its pods nothing to claim, so the scheduler treats
                              such a pool as ineligible and the deployment reports
                              InsufficientCapacity. A GPU request's count is the
                              GPUs per node.
                            required: [devices]
                            properties:
                              devices:
                                type: array
                                description: >-
                                  Device requests. A pool matches a request when
                                  it has a device whose count covers the request
                                  and whose driver, attributes, and capacity
                                  satisfy every selector.
                                minItems: 1
                                maxItems: 16
                                x-kubernetes-list-type: map
                                x-kubernetes-list-map-keys: [name]
                                items:
                                  type: object
                                  required: [name, selectors]
                                  properties:
                                    name:
                                      type: string
                                      description: >-
                                        Name of this request. Mirrors a DRA
                                        DeviceRequest name; carried through to
                                        the ResourceClaim.
                                      minLength: 1
                                      maxLength: 63
                                    count:
                                      type: integer
                                      description: >-
                                        How many matching devices a node must
                                        have. For a GPU request this is the
                                        per-node GPU count.
                                      default: 1
                                      minimum: 1
                                      maximum: 64
                                    selectors:
                                      type: array
                                      description: >-
                                        Selectors a device must satisfy, all
                                        ANDed. Each is a one-of; today only cel
                                        is supported.
                                      minItems: 1
                                      maxItems: 8
                                      x-kubernetes-list-type: atomic
                                      items:
                                        type: object
                                        # A selector must carry at least one
                                        # selector kind (today only cel). Without
                                        # this an empty {} selector would match
                                        # every device, and since nodeSelector is
                                        # the only path to a GPU that silently
                                        # claims an arbitrary one.
                                        minProperties: 1
                                        properties:
                                          cel:
                                            type: string
                                            description: >-
                                              A DRA CEL expression evaluated
                                              against one device. Reads
                                              device.driver,
                                              device.attributes["<driver>"].<name>
                                              (typed), and
                                              device.capacity["<driver>"].<name>
                                              (a Quantity), with quantity() and
                                              semver() helpers, e.g.
                                              device.capacity["gpu.nvidia.com"].memory.compareTo(quantity("141Gi")) >= 0.
                                            minLength: 1
                                            maxLength: 10240
                          template:
                            type: object
                            description: >-
                              Pod template for this member's engine pods. A
                              curated subset of PodTemplateSpec.
                            properties:
                              metadata:
                                type: object
                                description: >-
                                  Metadata applied to the member's pods. Useful
                                  for labels and annotations that control
                                  cluster-level features like service mesh
                                  injection.
                                properties:
                                  labels:
                                    type: object
                                    additionalProperties:
                                      type: string
                                  annotations:
                                    type: object
                                    additionalProperties:
                                      type: string
                              spec:
                                type: object
                                required: [containers]
                                description: >-
                                  Pod spec for this member's engine pods.
                                properties:
                                  containers:
                                    type: array
                                    minItems: 1
                                    maxItems: 1
                                    description: >-
                                      Containers for the engine pod. v0.1 supports
                                      a single container, which must be named
                                      "engine" (the inference engine). Sidecar /
                                      multi-container support is tracked
                                      separately.
                                    x-kubernetes-validations:
                                    - rule: "self.exists_one(c, c.name == 'engine')"
                                      message: "the single container must be named 'engine'"
                                    items:
                                      type: object
                                      required: [name, image]
                                      properties:
                                        name:
                                          type: string
                                          minLength: 1
                                          description: >-
                                            Container name. The container named
                                            "engine" is the inference engine.
                                        image:
                                          type: string
                                          minLength: 1
                                          description: Container image.
                                        command:
                                          type: array
                                          description: >-
                                            Container entrypoint override, passed
                                            through verbatim. For a Leader or
                                            Worker, the command owns cross-node
                                            coordination and addresses the leader
                                            through $(MODELPLANE_LEADER_ADDRESS),
                                            which Modelplane injects into every
                                            engine container.
                                          items:
                                            type: string
                                        args:
                                          type: array
                                          description: >-
                                            Container args, passed through to the
                                            serving engine. Includes the model
                                            identifier (e.g. --model=...) and any
                                            parallelism flags.
                                          items:
                                            type: string
                                        env:
                                          type: array
                                          description: >-
                                            Environment variables. Supports
                                            valueFrom.secretKeyRef for secrets
                                            like HF_TOKEN.
                                          items:
                                            type: object
                                            required: [name]
                                            properties:
                                              name:
                                                type: string
                                              value:
                                                type: string
                                              valueFrom:
                                                type: object
                                                properties:
                                                  secretKeyRef:
                                                    type: object
                                                    required: [name, key]
                                                    properties:
                                                      name:
                                                        type: string
                                                      key:
                                                        type: string
                                                      optional:
                                                        type: boolean
                                                  configMapKeyRef:
                                                    type: object
                                                    required: [name, key]
                                                    properties:
                                                      name:
                                                        type: string
                                                      key:
                                                        type: string
                                                      optional:
                                                        type: boolean
                                  imagePullSecrets:
                                    type: array
                                    description: >-
                                      Image pull secrets for private registries
                                      (NGC etc.).
                                    items:
                                      type: object
                                      required: [name]
                                      properties:
                                        name:
                                          type: string
          status:
            type: object
            properties:
              replicas:
                type: object
                properties:
                  total:
                    type: integer
                  ready:
                    type: integer
