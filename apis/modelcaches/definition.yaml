apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: modelcaches.modelplane.ai
spec:
  group: modelplane.ai
  names:
    categories: [crossplane, modelplane]
    kind: ModelCache
    plural: modelcaches
    shortNames: [mc]
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    additionalPrinterColumns:
    - name: KIND
      type: string
      jsonPath: .spec.artifact.kind
    - name: BACKEND
      type: string
      jsonPath: .spec.storage.backend
    - name: CLUSTERS
      type: string
      jsonPath: .status.summary.ready
    schema:
      openAPIV3Schema:
        type: object
        required: [spec]
        properties:
          spec:
            type: object
            required: [artifact, mount, storage]
            properties:
              artifact:
                type: object
                required: [kind, source]
                description: >-
                  What to stage and where to fetch it from.
                properties:
                  kind:
                    type: string
                    description: >-
                      Artifact kind discriminator. Drives validation
                      and engine wiring, not strict content separation
                      — a HuggingFace repo bundles weights and
                      tokenizer files, and a `Weights` cache stages
                      the whole bundle. Use `Tokenizer` when the
                      tokenizer is staged independently and `Bytes`
                      for anything that doesn't fit a typed kind.
                      v0.1 supports Weights, Tokenizer, and Bytes;
                      Adapter and Engine are deferred to v0.2.
                    enum: [Weights, Tokenizer, Bytes]
                  source:
                    type: object
                    description: >-
                      Where to fetch the artifact from. Exactly one
                      source must be set. The partition axis is fetch
                      protocol. v0.2 adds direct fetch sources (gcs,
                      azure, pvc-clone) here and moves registry
                      resolvers (mlflow, kubeflow, wandb, nimCatalog)
                      under a separate spec.artifact.resolvedVia
                      block so this field stays at one abstraction
                      level.
                    properties:
                      huggingFace:
                        type: object
                        required: [repo]
                        properties:
                          repo:
                            type: string
                            description: HuggingFace repository ID.
                            minLength: 1
                          revision:
                            type: string
                            description: >-
                              Branch, tag, or commit SHA. Defaults to
                              the repo's default branch.
                          tokenSecretRef:
                            type: object
                            description: >-
                              Reference to a Secret holding an HF
                              token for gated or private repos.
                            required: [name]
                            properties:
                              name:
                                type: string
                                minLength: 1
                              key:
                                type: string
                                default: HF_TOKEN
                      s3:
                        type: object
                        required: [uri]
                        properties:
                          uri:
                            type: string
                            description: S3 URI (s3://bucket/prefix/).
                            pattern: "^s3://.+"
                          region:
                            type: string
                          secretRef:
                            type: object
                            description: >-
                              Reference to a Secret with AWS
                              credentials (access key + secret).
                            required: [name]
                            properties:
                              name:
                                type: string
                                minLength: 1
                      http:
                        type: object
                        required: [url]
                        description: >-
                          Generic HTTP(S) source. Used for internal
                          artifact servers, signed URLs, and NIM/NGC
                          endpoints.
                        properties:
                          url:
                            type: string
                            description: >-
                              Fully-qualified URL. The hydration Job
                              fetches with curl.
                            pattern: "^https?://.+"
                          authSecretRef:
                            type: object
                            description: >-
                              Optional Secret holding an Authorization
                              header value (e.g. "Bearer <token>").
                            required: [name]
                            properties:
                              name:
                                type: string
                                minLength: 1
                              key:
                                type: string
                                default: Authorization
                      oci:
                        type: object
                        required: [image]
                        description: >-
                          OCI registry artifact (Harbor / Zot / GHCR /
                          ECR / GAR). Fetched via ORAS. Discriminator
                          locked for v0.1; full implementation pending.
                        properties:
                          image:
                            type: string
                            description: >-
                              OCI artifact reference (registry/repo:tag
                              or digest).
                            minLength: 1
                          pullSecretRef:
                            type: object
                            description: >-
                              Optional Secret holding a Docker config
                              JSON for registry auth.
                            required: [name]
                            properties:
                              name:
                                type: string
                                minLength: 1
                      inline:
                        type: object
                        required: [content]
                        description: >-
                          Literal bytes embedded in the CR. Small text
                          artifacts only — chat templates, config
                          snippets.
                        properties:
                          content:
                            type: string
                            description: >-
                              File content written to mount.path on
                              hydration.
                            minLength: 1
                          filename:
                            type: string
                            description: >-
                              Name of the file written inside the PVC.
                              Defaults to "artifact".
                            default: artifact
                            minLength: 1
                      configMap:
                        type: object
                        required: [name]
                        description: >-
                          Reference an existing ConfigMap on the
                          workload cluster. Discriminator locked for
                          v0.1; full implementation pending.
                        properties:
                          name:
                            type: string
                            minLength: 1
                          key:
                            type: string
                            description: >-
                              Optional single-key projection. If
                              omitted, all keys are written as files.
              mount:
                type: object
                required: [path]
                description: >-
                  Where the artifact appears inside consuming pods.
                properties:
                  path:
                    type: string
                    description: Absolute filesystem path inside the pod.
                    pattern: "^/.+"
                  subPath:
                    type: string
                    description: Optional sub-path within the artifact.
              storage:
                type: object
                required: [backend]
                description: >-
                  How to stage the artifact on each matched cluster.
                properties:
                  backend:
                    type: string
                    description: >-
                      Storage backend discriminator. v0.1 supports
                      PVC (Modelplane-managed) and ExistingPVC
                      (customer-managed). ContentAddressed and Custom
                      backends are deferred to v0.2.
                    enum: [PVC, ExistingPVC]
                  pvc:
                    type: object
                    required: [storageClassName, sizeGiB]
                    description: >-
                      PVC backend config. The composition creates a
                      PVC + a hydration Job on each matched cluster.
                    properties:
                      storageClassName:
                        type: string
                        minLength: 1
                        description: >-
                          Storage class on the workload cluster. Must
                          support ReadWriteMany if multiple replicas
                          share a single PVC. CSI choice (network
                          filesystem, parallel filesystem,
                          object-backed FUSE, replicated block) has
                          material cold-start perf/cost implications
                          at large model sizes.
                      sizeGiB:
                        type: integer
                        minimum: 1
                        maximum: 10000
                      accessMode:
                        type: string
                        enum: [ReadWriteOnce, ReadWriteMany, ReadOnlyMany]
                        default: ReadWriteMany
                  existingPVC:
                    type: object
                    required: [claimName]
                    description: >-
                      Mount a customer-managed PVC by name. Modelplane
                      doesn't create the PVC, doesn't hydrate it, and
                      doesn't enforce a storage class — the customer
                      owns the bytes. The claim must already exist on
                      every matched cluster.
                    properties:
                      claimName:
                        type: string
                        minLength: 1
                        description: >-
                          Name of the existing PersistentVolumeClaim
                          on each workload cluster.
              clusterSelector:
                type: object
                description: >-
                  Label selector to pick the InferenceClusters that
                  stage this artifact. If omitted, all clusters match.
                properties:
                  matchLabels:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
              replication:
                type: string
                enum: [AllMatchingClusters]
                default: AllMatchingClusters
                description: >-
                  Replication policy. v0.1 supports
                  AllMatchingClusters only.
          status:
            type: object
            properties:
              conditions:
                type: array
                items:
                  type: object
              resolvedDigest:
                type: string
                description: >-
                  Source-side digest pin recorded at hydration time
                  (e.g. HF commit SHA, S3 ETag, OCI digest). Empty
                  until the first cluster successfully hydrates.
                  Populated by a follow-up that wires per-source
                  digest capture.
              lastHydratedAt:
                type: string
                format: date-time
                description: >-
                  Timestamp of the most recent successful hydration on
                  any cluster.
              bytesStaged:
                type: string
                description: >-
                  Human-readable size of the staged artifact (e.g.
                  "140Gi"). Populated by a follow-up that measures the
                  PVC after hydration.
              references:
                type: array
                description: >-
                  ModelDeployments currently using this cache. Refcount
                  populated by the ModelDeployment composition function
                  once the spec.caches wiring lands (depends on #75).
                items:
                  type: object
                  required: [name, namespace]
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
              summary:
                type: object
                description: Per-cluster ready / total counts.
                properties:
                  ready:
                    type: string
                    description: e.g. "2/3"
              clusters:
                type: array
                description: Per-cluster staging status.
                items:
                  type: object
                  required: [name]
                  properties:
                    name:
                      type: string
                    phase:
                      type: string
                      enum: [Pending, Hydrating, Ready, Failed]
                    bytesStaged:
                      type: string
                      description: Human-readable size (e.g. "140Gi").
                    message:
                      type: string
