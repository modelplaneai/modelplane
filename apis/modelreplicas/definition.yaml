apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: modelreplicas.modelplane.ai
spec:
  group: modelplane.ai
  names:
    categories: [crossplane, modelplane]
    kind: ModelReplica
    plural: modelreplicas
    shortNames: [mr]
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    additionalPrinterColumns:
    - name: READY
      type: string
      jsonPath: .status.conditions[?(@.type=='Ready')].status
    - name: CLUSTER
      type: string
      jsonPath: .spec.inferenceClusterRef.name
    - name: STRATEGY
      type: string
      jsonPath: .spec.workers.topology.strategy
    - name: AGE
      type: date
      jsonPath: .metadata.creationTimestamp
    schema:
      openAPIV3Schema:
        type: object
        required: [spec]
        properties:
          spec:
            type: object
            required: [inferenceClusterRef, workers, engine]
            properties:
              inferenceClusterRef:
                type: object
                required: [name]
                description: >-
                  Reference to the InferenceCluster this replica targets.
                properties:
                  name:
                    type: string
              workers:
                type: object
                required: [topology, resources]
                properties:
                  count:
                    type: integer
                    minimum: 1
                    default: 1
                  topology:
                    type: object
                    required: [strategy]
                    properties:
                      strategy:
                        type: string
                        enum: [Tensor, TensorPipeline]
                      tensor:
                        type: integer
                        minimum: 1
                      pipeline:
                        type: integer
                        minimum: 2
                  resources:
                    type: object
                    required: [cpu, memory]
                    properties:
                      cpu:
                        type: string
                        minLength: 1
                      memory:
                        type: string
                        minLength: 1
              engine:
                type: object
                required: [image]
                properties:
                  image:
                    type: string
                    minLength: 1
                  args:
                    type: array
                    items:
                      type: string
                  env:
                    type: array
                    items:
                      type: object
                      required: [name]
                      properties:
                        name:
                          type: string
                        value:
                          type: string
                        valueFrom:
                          type: object
                          properties:
                            secretKeyRef:
                              type: object
                              required: [name, key]
                              properties:
                                name:
                                  type: string
                                key:
                                  type: string
                                optional:
                                  type: boolean
                            configMapKeyRef:
                              type: object
                              required: [name, key]
                              properties:
                                name:
                                  type: string
                                key:
                                  type: string
                                optional:
                                  type: boolean
                  imagePullSecrets:
                    type: array
                    items:
                      type: object
                      required: [name]
                      properties:
                        name:
                          type: string
          status:
            type: object
