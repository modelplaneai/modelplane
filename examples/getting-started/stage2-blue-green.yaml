# Stage 2 — roll out a new model version behind the same endpoint (blue/green).
#
# A second deployment (qwen-14b-v2, the "green" candidate) joins the SAME
# `qwen-14b` ModelService as a second `endpoints[]` entry. The service
# load-balances evenly across every healthy replica it matches, and there's one
# endpoint per replica — so the v1:v2 traffic split just follows replica counts.
# Start v2 small, shift traffic by scaling v2 up and v1 down, then retire v1.
# Roll back instantly by deleting v2. The public address never changes — clients
# keep calling the same `qwen-14b` — and there are no traffic weights or new
# gateway to manage.
#
#   kubectl apply -f stage2-blue-green.yaml          # v2 joins at 1 replica (v1=2): ~2/3 v1, 1/3 v2
#   kubectl -n ml-team get modelreplica -L modelplane.ai/deployment,modelplane.ai/cluster
#   # shift:    kubectl -n ml-team scale modeldeployment qwen-14b-v2 --replicas=2
#   #           kubectl -n ml-team scale modeldeployment qwen-14b    --replicas=1
#   # cut over: kubectl -n ml-team delete modeldeployment qwen-14b   # 100% v2
#   # rollback: kubectl -n ml-team delete modeldeployment qwen-14b-v2 # back to v1
#
# The candidate reuses the shared cache and serves the same model name; the
# "new version" here is a bigger context window (--max-model-len). Swap in
# whatever you're actually shipping (a new image, different flags, a fine-tune).
---
apiVersion: modelplane.ai/v1alpha1
kind: ModelDeployment
metadata:
  name: qwen-14b-v2
  namespace: ml-team
spec:
  replicas: 1
  modelCacheRef:
    name: qwen-14b
  engines:
  - name: qwen
    members:
    - role: Standalone
      nodeSelector:
        devices:
        - name: gpu
          count: 1
          selectors:
          - cel: |
              device.capacity["gpu.nvidia.com"].memory.compareTo(quantity("35Gi")) >= 0
      template:
        spec:
          containers:
          - name: engine
            image: vllm/vllm-openai:v0.11.0
            args:
            - --model=/mnt/models
            - --served-model-name=qwen-14b      # same model name — endpoint stays transparent
            - --max-model-len=16384             # the new version's change
            - --gpu-memory-utilization=0.90
---
# One front door over both versions — one endpoint entry each. Traffic
# load-balances across all matched replicas, so the v1:v2 split follows replica
# counts.
apiVersion: modelplane.ai/v1alpha1
kind: ModelService
metadata:
  name: qwen-14b
  namespace: ml-team
spec:
  endpoints:
  - selector:
      matchLabels:
        modelplane.ai/deployment: qwen-14b
  - selector:
      matchLabels:
        modelplane.ai/deployment: qwen-14b-v2
