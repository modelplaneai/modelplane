# Part 2 — Scale to a multi-cluster fleet, scheduled by capability (GKE).
#
# The platform adds two "bigger" GPU clusters (1x A100 40GB each) in different
# regions, alongside the Part-1 L4 starter. The ML team doesn't change models or
# name clusters — it edits the SAME qwen-demo deployment in place: more replicas,
# and a selector that asks for more GPU memory. The DRA scheduler finds the
# hardware fleet-wide.
#
#     device.capacity["gpu.nvidia.com"].memory.compareTo(quantity("35Gi")) >= 0
#
# That lands the replicas on the two A100 clusters (either region) and skips the
# L4 starter (24 GB). No clusterSelector. The endpoint URL never changes — the
# same `qwen` ModelService from Part 1 picks up the new replicas. Stand up more
# A100 capacity in a new region tomorrow and it's eligible automatically.
#
#   kubectl apply -f stage1-fleet-by-capability.yaml
#   kubectl -n ml-team get modelreplica -o wide   # watch it land on the A100 clusters
#
# Note: the 0.5B model doesn't need 40 GB — we're showing the selection
# mechanism. Size the threshold to your model.
#
# ── GPU choice & quota ────────────────────────────────────────────────────────
# A100 40GB — a2-highgpu-1g (a single-GPU node). Chosen because this project has
# A100-40 quota (16) but ZERO A100-80GB / H100 quota, and GKE has no 1-GPU H100
# node (a3-highgpu-8g is 8x). Verify your own quota.
# A100 80GB upgrade: machineType a2-ultragpu-1g, accelerator nvidia-a100-80gb,
#                    memory ~81920Mi; bump the selector to `>= 70Gi`.
---
apiVersion: modelplane.ai/v1alpha1
kind: InferenceClass
metadata:
  name: gke-a100-40-1x
spec:
  description: "GKE a2-highgpu-1g, 1x NVIDIA A100 40GB (the powerful workload GPU)"
  provisioning:
    provider: GKE
    gke:
      machineType: a2-highgpu-1g
      diskSizeGb: 200
      accelerator:
        type: nvidia-tesla-a100
        count: 1
  devices:
  - name: gpu
    claim: DRA
    driver: gpu.nvidia.com
    deviceClassName: gpu.nvidia.com
    count: 1
    attributes:
      architecture: { string: Ampere }
      cudaComputeCapability: { version: "8.0.0" }
    capacity:
      # A100 40GB real reported VRAM (verify against a live ResourceSlice). The
      # selector threshold must sit below it.
      memory: { value: "40960Mi" }
---
apiVersion: modelplane.ai/v1alpha1
kind: InferenceCluster
metadata:
  name: gpu-us-west
  labels:
    modelplane.ai/region: us-west
spec:
  cluster:
    source: GKE
    gke:
      project: crossplane-playground
      region: us-west1
  nodePools:
  - name: gpu-a100
    className: gke-a100-40-1x
    nodeCount: 1
    minNodeCount: 1   # keep >=1: the cluster autoscaler can't scale a GPU pool
    maxNodeCount: 2   # up from 0 for DRA ResourceClaim pods ("cannot allocate all claims")
    zones:
    - us-west1-b
---
apiVersion: modelplane.ai/v1alpha1
kind: InferenceCluster
metadata:
  name: gpu-us-east
  labels:
    modelplane.ai/region: us-east
spec:
  cluster:
    source: GKE
    gke:
      project: crossplane-playground
      region: us-east1
  nodePools:
  - name: gpu-a100
    className: gke-a100-40-1x
    nodeCount: 1
    minNodeCount: 1   # keep >=1: the cluster autoscaler can't scale a GPU pool
    maxNodeCount: 2   # up from 0 for DRA ResourceClaim pods ("cannot allocate all claims")
    zones:
    - us-east1-b
---
# The in-place edit: same model, same name, same ModelService — only the replica
# count and the capability selector change. Re-applying qwen-demo moves it off
# the L4 and onto the two A100 clusters.
apiVersion: modelplane.ai/v1alpha1
kind: ModelDeployment
metadata:
  name: qwen-demo
  namespace: ml-team
spec:
  replicas: 2                       # one per A100 cluster
  engines:
  - name: qwen
    members:
    - role: Standalone
      nodeSelector:
        devices:
        - name: gpu
          count: 1
          selectors:
          # "Give me a GPU with >= 35 GB." Only the A100 clusters qualify; the L4
          # starter (24 GB) is skipped — across regions, with no cluster name.
          - cel: |
              device.capacity["gpu.nvidia.com"].memory.compareTo(quantity("35Gi")) >= 0
      template:
        spec:
          containers:
          - name: engine
            image: vllm/vllm-openai:v0.11.0
            args:
            - --model=Qwen/Qwen2.5-0.5B-Instruct
            - --dtype=half
