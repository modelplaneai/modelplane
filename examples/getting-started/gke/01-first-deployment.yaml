# Part 1 — Create your first inference platform and model deployment (GKE).
#
# One starter GPU cluster (1x L4), one small model, one endpoint. Apply this,
# wait for the cluster + deployment to go Ready, and curl the ModelService.
#
#   kubectl apply -f stage0-single-cluster.yaml
#   kubectl -n ml-team get inferencecluster,modeldeployment,modelservice
#
# GKE twin of Rae's EKS "first-deployment" guide: same narrative and same small
# model, just GKE provisioning. Set the project to yours.
---
apiVersion: modelplane.ai/v1alpha1
kind: InferenceClass
metadata:
  name: gke-l4-1x-g2
spec:
  description: "GKE g2-standard-8, 1x NVIDIA L4 (the cheap starter GPU)"
  provisioning:
    provider: GKE
    gke:
      machineType: g2-standard-8
      diskSizeGb: 100
      accelerator:
        type: nvidia-l4
        count: 1
  devices:
  - name: gpu
    claim: DRA
    driver: gpu.nvidia.com
    deviceClassName: gpu.nvidia.com
    count: 1
    attributes:
      architecture: { string: Ada Lovelace }
    capacity:
      memory: { value: "23034Mi" }   # L4's real reported VRAM (not the nominal 24GB)
---
apiVersion: modelplane.ai/v1alpha1
kind: InferenceCluster
metadata:
  name: starter
  labels:
    modelplane.ai/region: us-central
spec:
  cluster:
    source: GKE
    gke:
      project: crossplane-playground
      region: us-central1
  nodePools:
  - name: gpu-l4
    className: gke-l4-1x-g2
    nodeCount: 1
    minNodeCount: 1   # keep >=1: the cluster autoscaler can't scale a GPU pool
    maxNodeCount: 2   # up from 0 for DRA ResourceClaim pods ("cannot allocate all claims")
    zones:
    - us-central1-a
---
# The ML team asks for the hardware its model needs (here, room for a small
# model) and Modelplane places the replica. Any L4 satisfies `>= 20Gi`.
apiVersion: modelplane.ai/v1alpha1
kind: ModelDeployment
metadata:
  name: qwen-demo
  namespace: ml-team
spec:
  replicas: 1
  engines:
  - name: qwen
    members:
    - role: Standalone
      nodeSelector:
        devices:
        - name: gpu
          count: 1
          selectors:
          - cel: |
              device.capacity["gpu.nvidia.com"].memory.compareTo(quantity("20Gi")) >= 0
      template:
        spec:
          containers:
          - name: engine
            image: vllm/vllm-openai:v0.11.0
            args:
            - --model=Qwen/Qwen2.5-0.5B-Instruct
            - --dtype=half
---
# One front door for the deployment. The path is /<namespace>/<modelservice>/...
# — here /ml-team/qwen/. The request body's `model` field is the model vLLM
# serves: the Hugging Face id, since this deployment doesn't set
# --served-model-name.
apiVersion: modelplane.ai/v1alpha1
kind: ModelService
metadata:
  name: qwen
  namespace: ml-team
spec:
  endpoints:
  - selector:
      matchLabels:
        modelplane.ai/deployment: qwen-demo
