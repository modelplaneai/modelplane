# Stage 2 — canary a new variant safely, behind the same endpoint.
#
# A second deployment (qwen-14b-canary) joins the SAME `qwen-14b` ModelService as
# a second endpoint entry. The service load-balances evenly across every healthy
# replica it matches, and there's one endpoint per replica — so the stable:canary
# traffic split just follows replica counts. Here 2 stable : 1 canary ≈ 67/33.
#
# Promote by scaling the canary up and the stable down; roll back by deleting the
# canary (or dropping its endpoint). No traffic weights, no new gateway, and the
# public address never changes — clients keep calling the same `qwen-14b`.
#
#   kubectl apply -f stage2-canary.yaml
#   kubectl -n ml-team get modelreplica -L modelplane.ai/deployment,modelplane.ai/cluster
#   # promote:  kubectl -n ml-team scale modeldeployment qwen-14b-canary --replicas=2
#   #           kubectl -n ml-team scale modeldeployment qwen-14b         --replicas=1
#   # rollback: kubectl -n ml-team delete modeldeployment qwen-14b-canary
#
# The canary reuses the shared cache and serves the same model name; the "change
# under test" here is a bigger context window (--max-model-len). Swap in whatever
# you're actually evaluating (a new image, different flags, a fine-tune).
---
apiVersion: modelplane.ai/v1alpha1
kind: ModelDeployment
metadata:
  name: qwen-14b-canary
  namespace: ml-team
spec:
  replicas: 1
  modelCacheRef:
    name: qwen-14b
  engines:
  - name: qwen
    members:
    - role: Standalone
      nodeSelector:
        devices:
        - name: gpu
          count: 1
          selectors:
          - cel: |
              device.capacity["gpu.nvidia.com"].memory.compareTo(quantity("35Gi")) >= 0
      template:
        spec:
          containers:
          - name: engine
            image: vllm/vllm-openai:v0.11.0
            args:
            - --model=/mnt/models
            - --served-model-name=qwen-14b      # same model name — endpoint stays transparent
            - --max-model-len=16384             # the change under test
            - --gpu-memory-utilization=0.90
---
# One front door over BOTH deployments — one endpoint entry each. Traffic
# load-balances across all matched replicas, so the split follows replica counts.
apiVersion: modelplane.ai/v1alpha1
kind: ModelService
metadata:
  name: qwen-14b
  namespace: ml-team
spec:
  endpoints:
  - selector:
      matchLabels:
        modelplane.ai/deployment: qwen-14b
  - selector:
      matchLabels:
        modelplane.ai/deployment: qwen-14b-canary
