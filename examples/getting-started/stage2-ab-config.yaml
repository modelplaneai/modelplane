# Stage 2 — A/B a serving-config change behind the same endpoint.
#
# You want to try a serving-config change — here a larger context window — without
# flipping it for everyone first. Stand up a second deployment with the new config
# (qwen-14b-tuned, same model and weights) and add it to the SAME `qwen-14b`
# ModelService as a second `endpoints[]` entry. The service load-balances across
# every healthy replica it matches, and there's one endpoint per replica — so the
# baseline:tuned traffic split just follows replica counts. Send a slice to the
# new config, compare on real traffic, then adopt it (scale tuned up, baseline
# down) or roll back (delete tuned). Same model name, same endpoint, no traffic
# weights, no new gateway.
#
#   kubectl apply -f stage2-ab-config.yaml     # tuned joins at 1 replica (baseline=2): ~2/3 : 1/3
#   kubectl -n ml-team get modelreplica -L modelplane.ai/deployment,modelplane.ai/cluster
#   # adopt:    kubectl -n ml-team scale modeldeployment qwen-14b-tuned --replicas=2
#   #           kubectl -n ml-team scale modeldeployment qwen-14b       --replicas=1
#   # rollback: kubectl -n ml-team delete modeldeployment qwen-14b-tuned
#
# Same weights via the shared cache and same served model name; the only
# difference is the engine config (--max-model-len). Swap in whatever you're
# evaluating (batching, chunked prefill, gpu-memory-utilization, dtype, ...).
---
apiVersion: modelplane.ai/v1alpha1
kind: ModelDeployment
metadata:
  name: qwen-14b-tuned
  namespace: ml-team
spec:
  replicas: 1
  modelCacheRef:
    name: qwen-14b
  engines:
  - name: qwen
    members:
    - role: Standalone
      nodeSelector:
        devices:
        - name: gpu
          count: 1
          selectors:
          - cel: |
              device.capacity["gpu.nvidia.com"].memory.compareTo(quantity("35Gi")) >= 0
      template:
        spec:
          containers:
          - name: engine
            image: vllm/vllm-openai:v0.11.0
            args:
            - --model=/mnt/models
            - --served-model-name=qwen-14b      # same model + name — endpoint stays transparent
            - --max-model-len=16384             # the config under test (baseline serves 8192)
            - --gpu-memory-utilization=0.90
---
# One front door over both configs — one endpoint entry each. Traffic
# load-balances across all matched replicas, so the baseline:tuned split follows
# replica counts.
apiVersion: modelplane.ai/v1alpha1
kind: ModelService
metadata:
  name: qwen-14b
  namespace: ml-team
spec:
  endpoints:
  - selector:
      matchLabels:
        modelplane.ai/deployment: qwen-14b
  - selector:
      matchLabels:
        modelplane.ai/deployment: qwen-14b-tuned
