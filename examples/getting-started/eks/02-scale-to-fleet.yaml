# Part 2 — Scale to a multi-cluster fleet, scheduled by capability (EKS).
#
# The platform adds two "bigger" GPU clusters (1x L40S 48GB each) in different
# regions, alongside the Part-1 L4 starter. The ML team edits the SAME qwen-demo
# deployment in place: more replicas, and a selector that asks for more GPU
# memory. The DRA scheduler finds the hardware fleet-wide.
#
#     device.capacity["gpu.nvidia.com"].memory.compareTo(quantity("40Gi")) >= 0
#
# That lands the replicas on the two L40S clusters and skips the L4 (24 GB). The
# endpoint URL never changes — the same `qwen` ModelService picks up the new
# replicas.
#
#   kubectl apply -f 02-scale-to-fleet.yaml
#   kubectl -n ml-team get modelreplica -o wide
#
# Note: the 0.5B model doesn't need 48 GB — we're showing the selection
# mechanism. Size the threshold to your model.
#
# ── GPU choice & cost ─────────────────────────────────────────────────────────
# L40S — g6e.xlarge, a single-GPU node (~$2/hr on-demand, us-east-1). There is no
# single-H100 EC2 instance (p5.48xlarge is 8x H100, ~$98/hr), so L40S is the
# right "bigger" single-GPU tier for a getting-started guide. Delete the clusters
# when you're done (see the docs' Clean up).
# Verify the `nvidia-l40s` accelerator enum and the L40S memory against a live
# ResourceSlice; keep the selector threshold below the reported value.
---
apiVersion: modelplane.ai/v1alpha1
kind: InferenceClass
metadata:
  name: l40s-1x-g6e
spec:
  description: "EKS g6e.xlarge, 1x NVIDIA L40S (48GB)"
  provisioning:
    provider: EKS
    eks:
      instanceType: g6e.xlarge
      diskSizeGb: 100
      accelerator:
        type: nvidia-l40s
        count: 1
  devices:
  - name: gpu
    claim: DRA
    driver: gpu.nvidia.com
    deviceClassName: gpu.nvidia.com
    count: 1
    attributes:
      architecture: { string: Ada Lovelace }
    capacity:
      memory: { value: "46068Mi" }   # L40S 48GB real reported VRAM — verify on a live ResourceSlice
---
apiVersion: modelplane.ai/v1alpha1
kind: InferenceCluster
metadata:
  name: eks-us-west
  labels:
    modelplane.ai/region: us-west
spec:
  cluster:
    source: EKS
    eks:
      region: us-west-2
  nodePools:
  - name: gpu-l40s
    className: l40s-1x-g6e
    nodeCount: 1
    minNodeCount: 1   # keep >=1; the autoscaler can't scale a GPU pool up from 0 for DRA pods
    maxNodeCount: 1
    zones:
    - us-west-2a
---
apiVersion: modelplane.ai/v1alpha1
kind: InferenceCluster
metadata:
  name: eks-eu-west
  labels:
    modelplane.ai/region: eu-west
spec:
  cluster:
    source: EKS
    eks:
      region: eu-west-1
  nodePools:
  - name: gpu-l40s
    className: l40s-1x-g6e
    nodeCount: 1
    minNodeCount: 1   # keep >=1; the autoscaler can't scale a GPU pool up from 0 for DRA pods
    maxNodeCount: 1
    zones:
    - eu-west-1b
---
# The in-place edit: same model, same name, same ModelService — only the replica
# count and the capability selector change.
apiVersion: modelplane.ai/v1alpha1
kind: ModelDeployment
metadata:
  name: qwen-demo
  namespace: ml-team
spec:
  replicas: 2                       # one per L40S cluster
  engines:
  - name: qwen
    members:
    - role: Standalone
      nodeSelector:
        devices:
        - name: gpu
          count: 1
          selectors:
          - cel: |
              device.capacity["gpu.nvidia.com"].memory.compareTo(quantity("40Gi")) >= 0
      template:
        spec:
          containers:
          - name: engine
            image: vllm/vllm-openai:v0.11.0
            args:
            - --model=Qwen/Qwen2.5-0.5B-Instruct
            - --dtype=half
