# A ModelDeployment deploys a model to one or more inference clusters.
# The scheduler picks clusters by clusterSelector labels and nodeSelector
# device requests, gated on available nodes. Each matched cluster gets one
# ModelReplica.
#
# The control plane creates a unified OpenAI-compatible endpoint:
#   http://<gateway-address>/<namespace>/<name>/v1/chat/completions
apiVersion: modelplane.ai/v1alpha1
kind: ModelDeployment
metadata:
  name: qwen-demo
  namespace: ml-team
spec:
  # Number of ModelReplicas to fan out to. Each replica is a complete
  # serving instance scheduled to one InferenceCluster.
  replicas: 1

  # Optional: restrict the scheduler to clusters with specific labels.
  # clusterSelector:
  #   matchLabels:
  #     modelplane.ai/region: us-central

  # Optional: node-level matching, a list of DRA device requests. The
  # scheduler matches each request against a candidate pool's InferenceClass
  # devices and pins the replica to a pool that matches. Each request's CEL
  # is real DRA CEL over a single device; quantity() and semver() are
  # helpers. claim: DRA devices also become requests in the DRA
  # ResourceClaim the serving pods claim GPUs through.
  # nodeSelector:
  #   devices:
  #   - name: gpu
  #     count: 1
  #     selectors:
  #     - cel: |
  #         device.capacity["gpu.nvidia.com"].memory.compareTo(quantity("80Gi")) >= 0 &&
  #         device.attributes["gpu.nvidia.com"].cudaComputeCapability.isGreaterThan(semver("8.9.0"))
  #   - name: nic
  #     count: 1
  #     selectors:
  #     - cel: device.attributes["nic.nvidia.com"].linkType == "infiniband"

  workers:
    # Compute topology for one worker. tensor=1 means one GPU per pod.
    topology:
      tensor: 1
    # Pod template for inference workers. The container named "engine"
    # is the inference engine; its image and args are passed through.
    template:
      spec:
        containers:
        - name: engine
          image: vllm/vllm-openai:v0.7.3
          args:
          - "--model=Qwen/Qwen2.5-0.5B-Instruct"
