# Basic HuggingFace Weights cache — the common case.
#
# ModelCache pulls Llama-3.3-70B from HuggingFace to a per-cluster
# RWX PVC; a downstream ModelDeployment mounts it at /mnt/model
# instead of redownloading on every replica boot.
#
# Apply this alongside one or more InferenceClusters labeled
# modelplane.ai/tier=production. Modelplane composes a PVC and a
# one-shot hydration Job per matched cluster; subsequent applies are
# no-ops because the Job short-circuits when the PVC already has
# content. ModelDeployment.spec.caches wiring lands once the new
# deployment shape from #75 stabilizes; until then this cache is
# applied on its own to demonstrate fleet-aware staging.
apiVersion: modelplane.ai/v1alpha1
kind: ModelCache
metadata:
  name: llama-3-3-70b
  namespace: ml-team
spec:
  artifact:
    kind: Weights
    source:
      huggingFace:
        repo: meta-llama/Llama-3.3-70B-Instruct
        revision: main
        tokenSecretRef:
          name: hf-token
  mount:
    path: /mnt/model
  storage:
    backend: PVC
    pvc:
      storageClassName: standard-rwx
      sizeGiB: 200
  clusterSelector:
    matchLabels:
      modelplane.ai/tier: production
  replication: AllMatchingClusters
