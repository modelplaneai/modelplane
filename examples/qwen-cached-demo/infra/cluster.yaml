# Single InferenceCluster for the qwen-cached-demo.
#
# source: GKE → Modelplane provisions the GKE cluster, installs the
# inference stack, and registers it in the fleet. Requires:
# - GCP project ID exported as $GCP_PROJECT (substituted by setup.sh)
# - Crossplane GCP provider configured with credentials
# - GPU quota in the chosen region for nvidia-l4 on g2-standard-8
#
# To reuse an existing GKE cluster instead, change source: GKE to
# source: Existing and add a secretRef pointing at a kubeconfig
# Secret in modelplane-system (see ../qwen-demo/03-cluster.yaml).
apiVersion: modelplane.ai/v1alpha1
kind: InferenceCluster
metadata:
  name: qwen-cached-demo
  labels:
    modelplane.ai/cluster: "true"
    modelplane.ai/region: us-central
spec:
  cluster:
    source: GKE
    gke:
      project: ${GCP_PROJECT}
      region: us-central1
  storage:
    # Asks Modelplane to ensure the cluster has a CSI driver that
    # supports shared (RWX) filesystem PVCs. On GKE this maps to
    # the Filestore CSI driver, which provides the standard-rwx /
    # premium-rwx storage classes used by ModelCache for multi-node
    # serving (LWS gang) and multi-replica reads.
    storageClassName: standard-rwx
    csiDrivers:
    - SharedFilesystem
  nodePools:
  - name: gpu-l4
    class: gke-l4-1x-g2
    # Two L4 nodes so the demo can run the cached and uncached
    # deployments side-by-side on the same cluster (one replica per
    # GPU, one GPU per node).
    nodeCount: 2
    zones:
    # us-central1-c hit GCE_STOCKOUT for L4 during this demo build.
    # us-central1-a generally has more L4 capacity.
    - us-central1-a
