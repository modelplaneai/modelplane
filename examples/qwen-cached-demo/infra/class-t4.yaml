# InferenceClass for T4 GPU on n1-standard-4. Used by qwen-cached-demo
# as a fallback to L4 — T4 is on a separate GCP inventory pool and
# usually has capacity when L4 is stocked out.
apiVersion: modelplane.ai/v1alpha1
kind: InferenceClass
metadata:
  name: gke-t4-1x-n1
spec:
  description: "GKE n1-standard-4, 1x NVIDIA T4"
  provisioning:
    provider: GKE
    gke:
      machineType: n1-standard-4
      diskSizeGb: 100
      accelerator:
        type: nvidia-tesla-t4
        count: 1
  resources:
    gpu:
      count: 1
      memory: 16Gi
