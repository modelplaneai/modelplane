# Uncached parallel deployment for cold-start comparison.
#
# Same Qwen 2.5 0.5B served by the same image as 02-deployment.yaml,
# but with no spec.caches — the engine pulls weights from HuggingFace
# at boot. Apply alongside the cached deployment and the timing delta
# is the cold-start speedup ModelCache buys.
apiVersion: modelplane.ai/v1alpha1
kind: ModelDeployment
metadata:
  name: qwen-uncached-demo
  namespace: ml-team
spec:
  replicas: 1
  workers:
    topology:
      strategy: Tensor
      tensor: 1
    resources:
      cpu: "4"
      memory: "10Gi"
  engine:
    image: vllm/vllm-openai:v0.7.3
    args:
    - "--model=Qwen/Qwen2.5-0.5B-Instruct"
    - "--served-model-name=qwen"
    - "--max-model-len=2048"
