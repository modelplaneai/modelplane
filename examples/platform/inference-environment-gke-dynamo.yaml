# An InferenceEnvironment backed by a GKE cluster with NVIDIA Dynamo installed.
#
# Modelplane provisions the full GKE cluster and installs the Dynamo platform
# (operator, etcd, NATS) plus its dependencies (cert-manager, Envoy Gateway,
# Prometheus, KEDA).
apiVersion: modelplane.ai/v1alpha1
kind: InferenceEnvironment
metadata:
  name: dynamo-us-central
  labels:
    modelplane.ai/environment: "true"
    modelplane.ai/region: us-central
spec:
  backend: Dynamo
  dynamo:
    version: "1.0.0"
    cluster:
      source: GKE
      gke:
        project: my-gcp-project  # Replace with your GCP project ID.
        region: us-central1

        nodePools:
          - name: system
            role: System
            machineType: e2-standard-4
            nodeCount: 1
            minNodeCount: 1
            maxNodeCount: 2

          - name: gpu-l4
            role: GPU
            machineType: g2-standard-8
            gpu:
              acceleratorType: nvidia-l4
              acceleratorCount: 1
            nodeCount: 1
            minNodeCount: 0
            maxNodeCount: 4
            zones:
              - us-central1-a
              - us-central1-c
