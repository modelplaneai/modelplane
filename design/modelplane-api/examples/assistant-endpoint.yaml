# Weighted ModelEndpoint across deployments and a SaaS provider.
#
# Demonstrates:
#   - Weighted routing across multiple ModelDeployments (canary / A-B / hybrid)
#   - A ModelService (Together) as a route target alongside Deployments
#   - Each Deployment route fans across all replica/placements of that MD;
#     KEDA + the cluster Service round-robin across the pods
#   - Multi-region spread happens via multiple ModelDeployments (one per
#     region/cluster) + multiple route entries on this resource
apiVersion: modelplane.ai/v1alpha1
kind: ModelEndpoint
metadata:
  name: assistant
  namespace: app-team
spec:
  routes:
    - type: Deployment
      weight: 65
      deployment:
        ref: { name: gpt-oss-20b }
    - type: Deployment
      weight: 25
      deployment:
        ref: { name: qwen3-coder }
    - type: Deployment
      weight: 5
      deployment:
        ref: { name: kimi-k2 }
    - type: ModelService
      weight: 5
      modelService:
        ref: { name: together-prod }       # SaaS spillover for burst traffic
