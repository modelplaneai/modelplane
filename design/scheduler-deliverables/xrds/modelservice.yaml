# ModelService — a SaaS or observed inference endpoint (Together, Baseten,
# Bedrock, customer-run KServe). Routing-only — never a placement target.
#
# Rough sketch: a separate concept for *placement* against dedicated SaaS
# endpoints (programmatic provisioning of a Together / Baseten dedicated
# inference) is on Nic to define; this CR is intentionally narrow.
#
# Namespace-scoped — sits alongside ModelDeployment / ModelEndpoint inside
# the namespace-as-environment lifecycle scope. Valid only as a route target
# on ModelEndpoint (alongside Deployment and External). The matcher does NOT
# consider ModelService as a fleet-member candidate; clusterClaim filters
# only against InferenceCluster.
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: modelservices.modelplane.ai
spec:
  group: modelplane.ai
  names:
    categories: [crossplane, modelplane]
    kind: ModelService
    plural: modelservices
    shortNames: [ms]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      additionalPrinterColumns:
        - name: READY
          type: string
          jsonPath: .status.conditions[?(@.type=='Ready')].status
        - name: ENDPOINT
          type: string
          jsonPath: .spec.endpoint.url
        - name: AGE
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [endpoint]
              properties:
                # ---- endpoint identity ----
                endpoint:
                  type: object
                  required: [url]
                  properties:
                    url:
                      type: string
                      description: OpenAI-compatible base URL.
                    auth:
                      type: object
                      properties:
                        secretRef:
                          type: object
                          required: [name, key]
                          properties:
                            name:      { type: string }
                            namespace: { type: string }
                            key:       { type: string }

                # ---- environment-level attributes (only level that applies) ----
                # No node or device attributes — providers don't expose either.
                attributes:
                  type: object
                  additionalProperties:
                    x-kubernetes-preserve-unknown-fields: true
                  description: |
                    Same shape as InferenceCluster.spec.attributes. Region, tier,
                    compliance, billingModel etc. The fleet scheduler matches against
                    these for environment-level claims; node and device claims no-op.

                # Engine + features intentionally NOT declared here — providers
                # are opaque routes. Workloads requiring engine features won't
                # match against providers (matcher surfaces this in matchTrace).

                # ---- catalog of models the provider serves ----
                supportedModels:
                  type: array
                  items: { type: string }
                  description: |
                    Canonical model names (HuggingFace IDs or provider-native).
                    Refreshed periodically; deployments with unmatched names are
                    excluded from this provider with a clear matchTrace reason.

            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:               { type: string }
                      status:             { type: string }
                      reason:             { type: string }
                      message:            { type: string }
                      lastTransitionTime: { type: string, format: date-time }
                lastHealthCheck:
                  type: string
                  format: date-time
