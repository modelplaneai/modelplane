# InferenceCluster — a customer Kubernetes cluster running KServe + DRA + Kueue + KEDA.
# Each InferenceCluster is a workload plane; Modelplane composes ModelPlacements onto it.
#
# Replaces the existing InferenceEnvironment XRD. Pure substrate: cluster source,
# node pools, three-level attributes, provisioning.mode. No engine or runtime
# concerns — those live on the KServeBackend internal XR (apis/kservebackends/),
# which represents the inference stack installed on this cluster. The matcher
# reads engine features from the associated KServeBackend, not from here.
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: inferenceclusters.modelplane.ai
spec:
  group: modelplane.ai
  names:
    categories: [crossplane, modelplane]
    kind: InferenceCluster
    plural: inferenceclusters
    shortNames: [ic]
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      additionalPrinterColumns:
        - name: READY
          type: string
          jsonPath: .status.conditions[?(@.type=='Ready')].status
        - name: PROVISIONING
          type: string
          jsonPath: .spec.provisioning.mode
        - name: AGE
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [cluster, provisioning]
              properties:
                # ---- cluster source ----
                cluster:
                  type: object
                  required: [source]
                  properties:
                    source:
                      type: string
                      enum: [GKE, EKS, AKS, Existing]
                    gke:
                      type: object
                      properties:
                        project: { type: string }
                        region:  { type: string }
                    existing:
                      type: object
                      properties:
                        secretRef:
                          type: object
                          required: [name, key]
                          properties:
                            name:      { type: string }
                            namespace: { type: string }
                            key:       { type: string }

                # ---- DRA vs device-plugin (device exposure path) ----
                provisioning:
                  type: object
                  required: [mode]
                  properties:
                    mode:
                      type: string
                      enum: [dra, device-plugin, hybrid]

                # ---- in-cluster scheduler ----
                # What admission / quota system runs on this cluster. Modelplane
                # composes admission CRs against this. `managed-kueue` means
                # Modelplane installs Kueue + creates ClusterQueues per pool;
                # `kueue` / `kai` / `volcano` mean operator brought their own;
                # `none` means no admission control (kube-scheduler best-effort).
                scheduler:
                  type: object
                  required: [type]
                  properties:
                    type:
                      type: string
                      enum: [managed-kueue, kueue, kai, volcano, none]

                # ---- inference backend (orchestrator) ----
                # What renders ModelPlacement (the intermediate representation)
                # into upstream objects.
                # `managed-kserve` means Modelplane installs KServe at `version`
                # + composes a KServeBackend; `kserve` / `dynamo` / `raw-vllm`
                # mean operator brought their own; `none` is invalid (cluster
                # must have a backend to host placements).
                backend:
                  type: object
                  required: [type]
                  properties:
                    type:
                      type: string
                      enum: [managed-kserve, kserve, dynamo, raw-vllm]
                    version:
                      type: string
                      description: |
                        Backend version pin (e.g. KServe v0.18.0). The matching
                        adapter is selected from this; absorbs upstream schema
                        churn (KServe v0.17 args→command, v0.18 storage migration).

                # ---- environment-level attributes (level 1 of three-level cascade) ----
                attributes:
                  type: object
                  additionalProperties:
                    x-kubernetes-preserve-unknown-fields: true
                  description: |
                    Domain-namespaced keys (e.g. modelplane.ai/region, acme.example/team).
                    Typed values per CapabilityVocabulary; unrecognized keys pass through.

                # Engine + features intentionally NOT here — they live on the
                # associated KServeBackend (apis/kservebackends/) which represents
                # the inference stack installed on this cluster. Substrate / runtime
                # split: this CR is hardware; KServeBackend is runtime. A cluster
                # may have multiple KServeBackends (e.g. vLLM + SGLang side-by-side).

                # ---- node pools ----
                nodePools:
                  type: array
                  items:
                    type: object
                    required: [name]
                    properties:
                      name: { type: string }

                      # nodeSelector — labels the composer uses to constrain pods
                      # to this pool's nodes. Modelplane-provisioned pools auto-apply
                      # `modelplane.ai/pool: <name>`. BYO pools require the operator
                      # to label their nodes themselves (or use cloud-provider native
                      # labels like cloud.google.com/gke-nodepool, eks.amazonaws.com/nodegroup).
                      nodeSelector:
                        type: object
                        additionalProperties: { type: string }

                      # provisioning is for creating the pool (CSP-specific)
                      provisioning:
                        type: object
                        properties:
                          gke:
                            type: object
                            properties:
                              machineType: { type: string }
                              gpu:
                                type: object
                                properties:
                                  type:  { type: string }
                                  count: { type: integer }
                              autoscaling:
                                type: object
                                properties:
                                  min: { type: integer, minimum: 0 }
                                  max: { type: integer, minimum: 0 }
                          eks:
                            type: object
                            properties:
                              instanceType: { type: string }
                              capacityType: { type: string, enum: [on-demand, spot] }

                      # node-level attributes (level 2)
                      nodeAttributes:
                        type: object
                        additionalProperties:
                          x-kubernetes-preserve-unknown-fields: true

                      # device-level attributes (level 3) — used for scale-zero pools
                      # where runtime ResourceSlices don't exist yet
                      deviceAttributes:
                        type: object
                        additionalProperties:
                          x-kubernetes-preserve-unknown-fields: true

            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:               { type: string }
                      status:             { type: string }
                      reason:             { type: string }
                      message:            { type: string }
                      lastTransitionTime: { type: string, format: date-time }
                capacity:
                  type: object
                  description: Roll-up of declared capacity per pool.
                gateway:
                  type: object
                  properties:
                    address: { type: string }
