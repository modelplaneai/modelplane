# gpt-oss-20b — small MoE, plain-label matching, scale-to-zero
#
# Demonstrates:
#   - Single-GPU deployment (20B MoE with ~3.6B active params; fits one device)
#   - Plain node-label matching via deviceClaim.selector.matchLabels — no DRA
#     required. Targets clusters running provisioning.mode: device-plugin.
#     Composer emits the pod with nvidia.com/gpu: 1 + a nodeSelector.
#   - Scale-to-zero (`minReplicas: 0`) for low-traffic / dev workloads
#   - For multi-region spread, create a second ModelDeployment targeting a
#     different region and route across both via a ModelEndpoint (or compose
#     them via a Crossplane XR).
apiVersion: modelplane.ai/v1alpha1
kind: ModelDeployment
metadata:
  name: gpt-oss-20b
  namespace: app-team
spec:
  replicas: 0                             # scale-to-zero baseline; KEDA scales up on traffic

  model:
    name: openai/gpt-oss-20b
  source: HuggingFace
  huggingFace:
    repo: openai/gpt-oss-20b

  clusterClaim:
    selector:
      matchLabels:
        modelplane.ai/tier: production


  deviceClaim:
    requests:
      - name: gpus
        count: 1
        perNode: 1
        selector:
          # Plain node-label match (pre-DRA simple path). For richer typed
          # constraints (e.g. NVLink-domain co-location), use matchAttributes
          # against DRA-published keys instead — see kimi-k2.yaml for that path.
          matchLabels:
            nvidia.com/gpu.family: hopper

  requiredEngineFeatures:
    - chunked-prefill
    - kv-cache-routing

  parallelism:
    tensor: 1

  engine:
    name: vLLM
    image: vllm/vllm-openai:v0.8.0
    args:
      - "--max-model-len=131072"
      - "--gpu-memory-utilization=0.90"
      - "--max-num-seqs=64"
      - "--enable-prefix-caching"

  scaling:
    signal: Concurrency
    concurrency:
      minReplicas: 0                    # scale-to-zero
      maxReplicas: 8
      target: 32
      window: 60s
      scaleDownDelay: 180s
