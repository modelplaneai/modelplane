# gpt-oss-20b — small MoE, hardware-heterogeneous, scale-to-zero, fan-out
#
# Demonstrates:
#   - Single-GPU deployment (20B MoE with ~3.6B active params; fits one device)
#   - Broad architecture acceptance: Ada / Hopper / Blackwell, with native MXFP4
#     on Blackwell and BF16/FP8 fallback elsewhere
#   - Scale-to-zero (`minReplicas: 0`) for low-traffic / dev workloads
#   - `environments: 2` for fan-out across two matched regions
apiVersion: modelplane.ai/v1alpha1
kind: ModelDeployment
metadata:
  name: gpt-oss-20b
  namespace: app-team
spec:
  model:
    name: openai/gpt-oss-20b
  source: HuggingFace
  huggingFace:
    repo: openai/gpt-oss-20b

  topology:
    nodes: 1
    devicesPerNode: 1
    parallelism:
      tensor: 1

  requires:
    minVramPerDevice: 48Gi
    architecture: [Ada, Hopper, Blackwell]
    precision: [bf16, fp8, mxfp4]         # native MXFP4 on Blackwell, fallback elsewhere
    engineFeatures:
      - chunked-prefill
      - kv-cache-routing

  engine:
    name: vLLM
    image: vllm/vllm-openai:v0.8.0
    args:
      - "--max-model-len=131072"
      - "--gpu-memory-utilization=0.90"
      - "--max-num-seqs=64"
      - "--enable-prefix-caching"

  environments: 2                         # fan out across two matched regions
  environmentSelector:
    matchLabels:
      modelplane.ai/tier: production

  scaling:
    signal: Concurrency
    concurrency:
      minReplicas: 0                      # scale-to-zero
      maxReplicas: 8
      target: 32
      window: 60s
      scaleDownDelay: 180s
