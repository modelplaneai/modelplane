# Qwen3-Coder — code completion, n-gram speculation, multi-LoRA
#
# Demonstrates:
#   - Three-level claim cascade per #56 (clusterClaim + deviceClaim;
#     no nodeClaim because single-node, no inter-node requirement)
#   - 8 devices per replica in a single NVLink domain
#   - Parallelism: TP=8 + expert parallelism for MoE
#   - n-gram speculation (excels at code per Inference Engineering Ch 5.2.4)
#   - Long context (256K)
#   - `adapters` block for multi-LoRA with LoRA-aware routing
#   - User-defined attributes for team affinity / cost-center tracking
#     (matched via clusterClaim.selector.matchAttributes)
#   - FP8 weight + KV quantization
apiVersion: modelplane.ai/v1alpha1
kind: ModelDeployment
metadata:
  name: qwen3-coder
  namespace: dev-tools
spec:
  replicas: 1                             # KEDA writes here via scale subresource

  model:
    name: Qwen/Qwen3-Coder-480B-A35B-Instruct
  source: HuggingFace
  huggingFace:
    repo: Qwen/Qwen3-Coder-480B-A35B-Instruct

  clusterClaim:
    selector:
      matchLabels:
        modelplane.ai/tier: production
      matchAttributes:
        "acme.example/team":         "dev-tools"
        "acme.example/cost-center":  "engineering"

  deviceClaim:
    requests:
      - name: gpus
        count: 8
        perNode: 8
        selector:
          matchAttributes:
            gpu.nvidia.com/architecture: [Hopper, Blackwell]
            gpu.nvidia.com/memory: ">=141Gi"
        constraints:
          - matchAttribute: gpu.nvidia.com/nvlinkDomain
            requests: [gpus]

  requiredEngineFeatures:
    - ngram-speculation
    - multi-lora
    - kv-cache-routing
    - chunked-prefill
    - fp8-kv-cache

  parallelism:
    tensor: 8
    expert: enabled

  engine:
    name: vLLM
    image: vllm/vllm-openai:v0.8.0
    args:
      - "--max-model-len=262144"
      - "--gpu-memory-utilization=0.92"
      - "--max-num-seqs=128"
      - "--enable-prefix-caching"
    quantization:
      precision: fp8
      target: [weights, kvCache]
    speculation:
      type: NGram
      ngram:
        n: 3
        maxSpeculativeTokens: 8

  scaling:
    signal: Concurrency
    concurrency:
      minReplicas: 1
      maxReplicas: 6
      target: 16
      window: 60s
      scaleDownDelay: 300s

  adapters:                             # multi-LoRA + LoRA-aware routing
    - name: acme-style
      source:
        huggingFace:
          repo: acme/qwen3-coder-style-lora
    - name: legacy-cobol
      source:
        huggingFace:
          repo: acme/qwen3-coder-cobol-lora
    - name: terraform-modules
      source:
        huggingFace:
          repo: acme/qwen3-coder-tf-lora
