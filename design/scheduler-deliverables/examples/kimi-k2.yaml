# Kimi K2 — frontier MoE, multi-node, disaggregated prefill/decode
#
# Demonstrates:
#   - Two-level claim cascade:
#       clusterClaim: filters InferenceCluster by env-level attrs
#       deviceClaim:  DRA-shaped; selector matches both node-level (fabric)
#                     and device-level (architecture, memory) attributes
#   - 16 devices per replica (count: 16, perNode: 8 → 2 nodes), constrained to
#     a single NVLink domain via DRA matchAttribute
#   - Parallelism: TP=8 within node, PP=2 across nodes, expert parallelism for MoE
#   - 5P3D disaggregation: 5 prefill replicas + 3 decode replicas
#     (each role inherits root deviceClaim + parallelism; only replicas differ)
#   - requiredEngineFeatures: cluster-runtime constraint matched against the
#     cluster's KServeBackend
#   - FP8 weight + KV cache quantization (engine.quantization)
apiVersion: modelplane.ai/v1alpha1
kind: ModelDeployment
metadata:
  name: kimi-k2
  namespace: research
spec:
  replicas: 1                             # KEDA writes here via scale subresource

  model:
    name: moonshotai/Kimi-K2-Instruct
  source: HuggingFace
  huggingFace:
    repo: moonshotai/Kimi-K2-Instruct
    revision: main
    secretRef:
      namespace: platform-system
      name: hf-token

  clusterClaim:
    selector:
      matchLabels:
        modelplane.ai/tier: production
        modelplane.ai/region: us-east

  deviceClaim:
    requests:
      - name: gpus
        count: 16                       # 2 nodes × 8 GPUs per replica
        perNode: 8
        selector:
          matchAttributes:
            gpu.nvidia.com/architecture: [Hopper, Blackwell]
            gpu.nvidia.com/memory: ">=141Gi"
            modelplane.ai/interNodeFabric: "ib-400g-or-better"  # node-level attr; uniform across devices
        constraints:
          - matchAttribute: gpu.nvidia.com/nvlinkDomain   # TP=8 in one NVLink domain
            requests: [gpus]

  requiredEngineFeatures:
    - prefill-decode-disagg
    - kv-cache-routing
    - chunked-prefill
    - fp8-kv-cache

  parallelism:
    tensor: 8
    pipeline: 2
    expert: enabled

  roles:                                # 5P3D disaggregation; roles inherit root shape
    prefill: { replicas: 5 }
    decode:  { replicas: 3 }

  engine:
    name: vLLM
    image: vllm/vllm-openai:v0.8.0
    args:
      - "--max-model-len=131072"
      - "--gpu-memory-utilization=0.90"
      - "--max-num-seqs=256"
      - "--distributed-executor-backend=ray"
    quantization:
      precision: fp8
      target: [weights, kvCache]

  scaling:
    signal: Concurrency
    concurrency:
      minReplicas: 1
      maxReplicas: 4
      target: 32
      window: 60s
      scaleDownDelay: 600s
