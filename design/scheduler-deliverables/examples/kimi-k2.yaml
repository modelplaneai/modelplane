# Kimi K2 — frontier MoE, multi-node, disaggregated prefill/decode
#
# Demonstrates:
#   - Multi-node topology: each replica is 2 nodes × 8 H200 = 16 GPUs
#   - Parallelism: TP=8 within node, PP=2 across nodes, expert parallelism for MoE
#   - 5P3D disaggregation: 5 prefill replicas + 3 decode replicas
#     (each role inherits root topology shape; only `replicas` differs)
#   - IB-400G inter-node fabric requirement (for PP and KV transfer)
#   - FP8 weight + KV cache quantization
#   - Production-tier environment selector
apiVersion: modelplane.ai/v1alpha1
kind: ModelDeployment
metadata:
  name: kimi-k2
  namespace: research
spec:
  model:
    name: moonshotai/Kimi-K2-Instruct
  source: HuggingFace
  huggingFace:
    repo: moonshotai/Kimi-K2-Instruct
    revision: main
    secretRef:
      namespace: platform-system
      name: hf-token

  topology:
    nodes: 2
    devicesPerNode: 8
    parallelism:
      tensor: 8
      pipeline: 2
      expert: enabled
    roles:                                # 5P3D disaggregation; roles inherit root topology
      prefill: { replicas: 5 }
      decode:  { replicas: 3 }

  requires:
    minVramPerDevice: 141Gi
    architecture: [Hopper, Blackwell]
    fabric: nvlink-domain                 # TP=8 must be inside one NVLink domain
    interNode: ib-400g-or-better          # for PP across nodes + disagg KV transfer
    precision: [fp8]
    engineFeatures:
      - prefill-decode-disagg
      - kv-cache-routing
      - chunked-prefill
      - fp8-kv-cache
    attributes:
      "modelplane.ai/tier": production

  engine:
    name: vLLM
    image: vllm/vllm-openai:v0.8.0
    args:
      - "--max-model-len=131072"
      - "--gpu-memory-utilization=0.90"
      - "--max-num-seqs=256"
      - "--distributed-executor-backend=ray"
    quantization:
      precision: fp8
      target: [weights, kvCache]

  environments: 1
  environmentSelector:
    matchLabels:
      modelplane.ai/tier: production
      modelplane.ai/region: us-east

  scaling:
    signal: Concurrency
    concurrency:
      minReplicas: 1
      maxReplicas: 4
      target: 32
      window: 60s
      scaleDownDelay: 600s
