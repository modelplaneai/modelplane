# v0.2 PREVIEW — Adapter kind (LoRA subtype).
#
# Per-tenant fine-tunes are the natural multi-LoRA pattern: one base
# model, hundreds-to-thousands of small adapters. v0.2 introduces an
# Adapter artifact kind with an adapterType discriminator (lora,
# controlnet, ipadapter, textualInversion, t2iAdapter); the scheduler
# ensures the adapter only lands on clusters serving the base.
#
# vLLM-side: engine started with --enable-lora and --lora-modules
# pointing at the mounted adapter directory. Adapters can be hot-
# swapped via vLLM's runtime LoRA API.
#
# Speedup (rough): adapter is ~50-500 MB for a rank-16 LoRA on a 70B
# base, so download is seconds. Win is dedup across tenants (thousands
# of adapters, one fleet copy each) and version rolls without re-staging
# the base.
#
# Provider note: `backend: ContentAddressed` shown here is the
# commercial Upbound substrate. For BYO content-addressed setups,
# swap `backend: Custom` with the equivalent webhook target — see
# example 06.

apiVersion: modelplane.ai/v1alpha1
kind: ModelCache
metadata:
  name: llama-3-3-70b
  namespace: ml-team
spec:
  artifact:
    kind: Weights
    source:
      huggingFace:
        repo: meta-llama/Llama-3.3-70B-Instruct
  mount:
    path: /mnt/model
  storage:
    backend: ContentAddressed
    contentAddressed:
      objectStore:
        bucket: s3://modelplane-content-store
  clusterSelector: { matchLabels: { modelplane.ai/tier: prod } }
  replication: AllMatchingClusters

---
apiVersion: modelplane.ai/v1alpha1
kind: ModelCache
metadata:
  name: acme-support-adapter-v3
  namespace: ml-team
spec:
  artifact:
    kind: Adapter
    adapterType: lora
    source:
      huggingFace:
        repo: acme-corp/support-llama-70b-lora-v3
    baseRef:
      cacheName: llama-3-3-70b               # adapter follows the base
  mount:
    path: /mnt/loras/acme-support-v3
  storage:
    backend: ContentAddressed
    contentAddressed:
      objectStore:
        bucket: s3://modelplane-content-store
  clusterSelector: { matchLabels: { modelplane.ai/tier: prod } }
  replication: AllMatchingClusters

---
apiVersion: modelplane.ai/v1alpha1
kind: ModelDeployment
metadata:
  name: acme-support
  namespace: ml-team
spec:
  replicas: 2
  workers:
    topology:
      strategy: Tensor
      tensor: 8
    resources:
      cpu: "16"
      memory: "64Gi"
  engine:
    image: vllm/vllm-openai:v0.11.0
    args:
      - --model=/mnt/model
      - --tensor-parallel-size=8
      - --enable-lora
      - --max-loras=4
      - --lora-modules=acme-support-v3=/mnt/loras/acme-support-v3
  caches:
    - name: llama-3-3-70b
    - name: acme-support-adapter-v3
