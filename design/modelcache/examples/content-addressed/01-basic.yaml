# Same model as ../01-basic-weights.yaml, on the content-addressed
# substrate. See ../README.md / content-addressed/README.md for the
# OSS-vs-commercial provider split.
#
# Behavior change vs PVC:
# - Bytes deduplicated across deployments (50 deployments of Llama
#   70B = one set of bytes in the fleet).
# - Lazy hydration: engine starts before all bytes arrive; weights
#   stream from object store on demand.
# - Tiered cache: per-node SSD as L1, object store as L2.
# - vLLM cold start ~95s eager → ~14s lazy (Modal benchmark).
#
# Migration: flip storage.backend from PVC; v0.1 PVC contents stay
# until eviction.

apiVersion: modelplane.ai/v1alpha1
kind: ModelCache
metadata:
  name: llama-3-3-70b
  namespace: ml-team
spec:
  artifact:
    kind: Weights
    source:
      huggingFace:
        repo: meta-llama/Llama-3.3-70B-Instruct
        secretRef: { name: hf-token, key: token }
  mount:
    path: /mnt/model
  storage:
    backend: ContentAddressed              # ← v0.2
    contentAddressed:
      objectStore:
        bucket: s3://modelplane-content-store
        regionReplication: [us-east-1, us-west-2, eu-west-1]
      tieredCache:
        nodeLocalSizeGiB: 500              # per-node SSD L1
      loading: Lazy                        # | Eager
  clusterSelector:
    matchLabels:
      modelplane.ai/tier: prod
  replication: AllMatchingClusters

---
apiVersion: modelplane.ai/v1alpha1
kind: ModelDeployment
metadata:
  name: llama-3-3-70b
  namespace: ml-team
spec:
  replicas: 4
  workers:
    topology:
      strategy: Tensor
      tensor: 8
    resources:
      cpu: "16"
      memory: "64Gi"
  engine:
    image: vllm/vllm-openai:v0.11.0
    args:
      - --model=/mnt/model
      - --tensor-parallel-size=8
  caches:
    - name: llama-3-3-70b
