# Adapter kind (LoRA subtype) — per-tenant fine-tunes on a shared
# base. Multi-LoRA serving: one base model, hundreds-to-thousands of
# small adapters; the scheduler keeps adapters on clusters serving
# the base. adapterType discriminates: lora | controlnet | ipadapter
# | textualInversion | t2iAdapter.
#
# vLLM-side: engine started with --enable-lora and --lora-modules
# pointing at the mounted adapter directory. Adapters can be hot-
# swapped via vLLM's runtime LoRA API.
#
# Win: adapter download is seconds (~50-500 MB for rank-16 on a 70B
# base); dedup across tenants (thousands of adapters, one fleet copy
# each); version rolls without re-staging the base.

apiVersion: modelplane.ai/v1alpha1
kind: ModelCache
metadata:
  name: llama-3-3-70b
  namespace: ml-team
spec:
  artifact:
    kind: Weights
    source:
      huggingFace:
        repo: meta-llama/Llama-3.3-70B-Instruct
  mount:
    path: /mnt/model
  storage:
    backend: ContentAddressed
    contentAddressed:
      objectStore:
        bucket: s3://modelplane-content-store
  clusterSelector: { matchLabels: { modelplane.ai/tier: prod } }
  replication: AllMatchingClusters

---
apiVersion: modelplane.ai/v1alpha1
kind: ModelCache
metadata:
  name: acme-support-adapter-v3
  namespace: ml-team
spec:
  artifact:
    kind: Adapter
    adapterType: lora
    source:
      huggingFace:
        repo: acme-corp/support-llama-70b-lora-v3
    baseRef:
      cacheName: llama-3-3-70b               # adapter follows the base
  mount:
    path: /mnt/loras/acme-support-v3
  storage:
    backend: ContentAddressed
    contentAddressed:
      objectStore:
        bucket: s3://modelplane-content-store
  clusterSelector: { matchLabels: { modelplane.ai/tier: prod } }
  replication: AllMatchingClusters

---
apiVersion: modelplane.ai/v1alpha1
kind: ModelDeployment
metadata:
  name: acme-support
  namespace: ml-team
spec:
  replicas: 2
  workers:
    topology:
      strategy: Tensor
      tensor: 8
    resources:
      cpu: "16"
      memory: "64Gi"
  engine:
    image: vllm/vllm-openai:v0.11.0
    args:
      - --model=/mnt/model
      - --tensor-parallel-size=8
      - --enable-lora
      - --max-loras=4
      - --lora-modules=acme-support-v3=/mnt/loras/acme-support-v3
  caches:
    - name: llama-3-3-70b
    - name: acme-support-adapter-v3
