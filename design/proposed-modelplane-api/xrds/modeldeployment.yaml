# ModelDeployment — the ML/App team's self-contained workload spec.
#
# Replaces the previous ModelDeployment + ClusterModel/Model split. Carries
# claims, engine config, scaling, and adapters in one place. The matcher
# composition function picks an InferenceCluster matching the claims and
# emits one ModelPlacement per logical replica (replica == placement).
# ModelPlacement is the existing CRD (apis/modelplacements/) playing the role
# of the intermediate representation between this user-facing CR and the
# rendered upstream objects (LLMInferenceService, etc.).
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: modeldeployments.modelplane.ai
spec:
  group: modelplane.ai
  names:
    categories: [crossplane, modelplane]
    kind: ModelDeployment
    plural: modeldeployments
    shortNames: [md]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      # Scale subresource — lets KEDA (or HPA / `kubectl scale`) drive the
      # number of logical replicas via `spec.replicas`. The composer reconciles
      # ModelPlacements to match: replica == placement, each placement carries
      # exactly one logical replica composed onto an InferenceCluster.
      subresources:
        status: {}
        scale:
          specReplicasPath: .spec.replicas
          statusReplicasPath: .status.replicas
          labelSelectorPath: .status.labelSelector
      additionalPrinterColumns:
        - name: READY
          type: string
          jsonPath: .status.conditions[?(@.type=='Ready')].status
        - name: MODEL
          type: string
          jsonPath: .spec.model.name
        - name: REPLICAS
          type: string
          jsonPath: .spec.replicas
        - name: PLACEMENTS
          type: string
          jsonPath: .status.placements.ready
        - name: AGE
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [model, source, deviceClaim, engine]
              properties:
                # ---- replica count (KEDA-writable via scale subresource) ----
                # Replica == placement. The composer reconciles `replicas`
                # ModelPlacements per ModelDeployment, each independently
                # scheduled by the matcher. KEDA writes here through the
                # scale subresource — no custom scaler needed.
                replicas:
                  type: integer
                  minimum: 0
                  default: 1
                  description: |
                    Number of logical replicas. Each replica == one
                    ModelPlacement composed onto an InferenceCluster. KEDA's
                    standard ScaledObject (composed from spec.scaling) writes
                    here.

                # ---- model identity ----
                model:
                  type: object
                  required: [name]
                  properties:
                    name:
                      type: string
                      description: Engine-facing model name (passed via --model).

                source:
                  type: string
                  enum: [HuggingFace, S3, GCS, PVC]
                huggingFace:
                  type: object
                  properties:
                    repo:     { type: string }
                    revision: { type: string }
                    secretRef:
                      type: object
                      properties:
                        name:      { type: string }
                        namespace: { type: string }

                # ---- two-level claim cascade ----
                # The matcher considers only InferenceCluster candidates.
                # ModelService is routing-only (never a placement target);
                # SaaS placement is a separate concept Nic owns.
                #
                # clusterClaim — filters InferenceCluster against env-level attrs
                # deviceClaim  — DRA-shaped; filters devices in matched clusters'
                #                pools. Selector matches both node-level and
                #                device-level attributes uniformly (device attrs
                #                are uniform across devices on a node, so the
                #                distinction isn't load-bearing).
                # matchTrace surfaces level-by-level exclusions with field-level reasons.

                clusterClaim:
                  type: object
                  description: Filters InferenceCluster candidates by env-level attributes.
                  properties:
                    selector:
                      type: object
                      properties:
                        matchLabels:
                          type: object
                          additionalProperties: { type: string }
                        matchAttributes:
                          type: object
                          additionalProperties:
                            x-kubernetes-preserve-unknown-fields: true
                          description: |
                            Matched against env-level attributes on the
                            InferenceCluster. Values may be scalars, lists, or
                            comparison strings (">=141Gi").
                        cel:
                          type: string
                          description: Break-glass — CEL over environment.attributes.

                deviceClaim:
                  type: object
                  description: |
                    DRA-shaped device claim. Resolves to a ResourceClaimTemplate
                    that the K8s scheduler + DRA driver consume to bind devices.
                    The selector matches against both node-level attributes
                    (e.g. modelplane.ai/interNodeFabric) and device-level
                    attributes (gpu.nvidia.com/*) uniformly.
                  required: [requests]
                  properties:
                    requests:
                      type: array
                      minItems: 1
                      items:
                        type: object
                        required: [name, count]
                        properties:
                          name: { type: string }
                          count:
                            type: integer
                            minimum: 1
                            description: Total devices needed (e.g. 16 for 2 nodes × 8 GPUs).
                          perNode:
                            type: integer
                            minimum: 1
                            description: Devices per node — together with `count` implies node count.
                          selector:
                            type: object
                            description: |
                              Match path — labels first, DRA as break-glass:
                                matchLabels    — primary path. Plain node labels
                                                 (nvidia.com/gpu.family,
                                                 modelplane.ai/accelerator, etc.).
                                                 No DRA required. Composer emits
                                                 pod with nvidia.com/gpu: <count>
                                                 + nodeSelector from these labels.
                                matchAttributes — break-glass for richer typed
                                                 constraints (NVLink-domain
                                                 co-location, MIG state, FP8
                                                 capability). DRA-shaped; composer
                                                 emits a ResourceClaimTemplate.
                                cel             — escape hatch for boolean / set
                                                 arithmetic over device attrs.
                            properties:
                              matchLabels:
                                type: object
                                additionalProperties: { type: string }
                                description: |
                                  Primary match path. Plain K8s node labels —
                                  works against any cluster with labeled nodes.
                                  Sufficient for most workloads. Constraints that
                                  need topology-awareness (NVLink-domain
                                  co-location) can't be expressed here; use
                                  matchAttributes + DRA for those.
                              matchAttributes:
                                type: object
                                additionalProperties:
                                  x-kubernetes-preserve-unknown-fields: true
                                description: |
                                  Break-glass for richer typed constraints. Matched
                                  against device attributes (DRA-published vendor
                                  keys like gpu.nvidia.com/architecture, or
                                  declared deviceAttributes on scale-zero pools).
                                  Requires the cluster to run provisioning.mode:
                                  dra.
                              cel:
                                type: string
                                description: Break-glass CEL — for constraints not expressible in matchLabels / matchAttributes.
                          constraints:
                            type: array
                            items:
                              type: object
                              properties:
                                matchAttribute:
                                  type: string
                                  description: |
                                    DRA matchAttribute constraint — e.g.
                                    "gpu.nvidia.com/nvlinkDomain" requires all
                                    devices in the same NVLink domain.
                                requests:
                                  type: array
                                  items: { type: string }

                # ---- cluster-runtime constraint ----
                # Set-membership match against the chosen InferenceCluster's
                # KServeBackend.spec.engine.features.
                requiredEngineFeatures:
                  type: array
                  items: { type: string }

                # ---- deployment shape (not claims) ----
                parallelism:
                  type: object
                  properties:
                    tensor:
                      type: integer
                      minimum: 1
                    pipeline:
                      type: integer
                      minimum: 1
                      default: 1
                    expert:
                      type: string
                      enum: [enabled, disabled]
                      default: disabled

                roles:
                  type: object
                  description: |
                    Optional. Presence enables disaggregated serving (xPyD).
                    Each role inherits root parallelism / deviceClaim if not
                    overridden; only `replicas` differs in the simple case.
                  properties:
                    prefill:
                      type: object
                      properties:
                        deviceClaim:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                        parallelism:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                        replicas: { type: integer, minimum: 1 }
                    decode:
                      type: object
                      properties:
                        deviceClaim:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                        parallelism:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                        replicas: { type: integer, minimum: 1 }

                # ---- engine ----
                engine:
                  type: object
                  required: [name, image]
                  properties:
                    name:
                      type: string
                      enum: [vLLM, SGLang, TensorRT-LLM, TGI]
                    image: { type: string }
                    args:
                      type: array
                      items: { type: string }
                    quantization:
                      type: object
                      properties:
                        precision:
                          type: string
                          enum: [bf16, fp8, mxfp8, int8, fp4, mxfp4, nvfp4, int4]
                        target:
                          type: array
                          items:
                            type: string
                            enum: [weights, activations, kvCache, attention]
                    speculation:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: [EAGLE, DraftTarget, Medusa, NGram, Lookahead]
                        eagle:
                          type: object
                          properties:
                            headRef:
                              type: object
                              properties:
                                kind: { type: string }
                                name: { type: string }
                        draftTarget:
                          type: object
                          properties:
                            draftModelRef:
                              type: object
                              properties:
                                kind: { type: string }
                                name: { type: string }
                            numSpeculativeTokens: { type: integer }
                        ngram:
                          type: object
                          properties:
                            n:                    { type: integer, minimum: 1 }
                            maxSpeculativeTokens: { type: integer, minimum: 1 }
                    advanced:
                      type: array
                      description: Break-glass for novel knobs the IR doesn't model.
                      items:
                        type: object
                        required: [name]
                        properties:
                          name:   { type: string }
                          config:
                            type: object
                            x-kubernetes-preserve-unknown-fields: true

                # ---- scaling ----
                # The composer turns this into a stock KEDA ScaledObject that
                # targets the ModelDeployment via its scale subresource. KEDA
                # writes spec.replicas; the composer reconciles ModelPlacements
                # (one per replica) to match. Each replica is independently
                # scheduled by the matcher against clusterClaim.
                # Multi-region spread = multiple ModelDeployments + ModelEndpoint.
                scaling:
                  type: object
                  properties:
                    signal:
                      type: string
                      enum: [Concurrency, Utilization, Both]
                      default: Concurrency
                    concurrency:
                      type: object
                      properties:
                        minReplicas:
                          type: integer
                          minimum: 0
                          description: |
                            Lower bound on logical replicas. Each replica is one
                            ModelPlacement composing one LLMInferenceService.spec.replicas: 1.
                        maxReplicas:    { type: integer, minimum: 1 }
                        target:         { type: integer, minimum: 1 }
                        window:         { type: string, default: "60s" }
                        scaleDownDelay: { type: string, default: "300s" }

                # ---- LoRA adapters ----
                adapters:
                  type: array
                  items:
                    type: object
                    required: [name, source]
                    properties:
                      name: { type: string }
                      source:
                        type: object
                        properties:
                          huggingFace:
                            type: object
                            properties:
                              repo:     { type: string }
                              revision: { type: string }

            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:               { type: string }
                      status:             { type: string }
                      reason:             { type: string }
                      message:            { type: string }
                      lastTransitionTime: { type: string, format: date-time }
                # Required by the scale subresource. `replicas` mirrors
                # spec.replicas observed by the composer; `labelSelector` is
                # the selector that matches the deployment's ModelPlacements
                # (so HPA / KEDA can read pod counts via standard tooling).
                replicas:
                  type: integer
                labelSelector:
                  type: string
                placements:
                  type: object
                  properties:
                    total: { type: integer }
                    ready: { type: integer }
                matchTrace:
                  type: object
                  description: Per-fleet-member compatibility report; field-level reasons.
                  x-kubernetes-preserve-unknown-fields: true
