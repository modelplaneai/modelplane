# ModelDeployment — the ML/App team's self-contained workload spec.
#
# Replaces the previous ModelDeployment + ClusterModel/Model split. Carries
# claims, engine config, scaling, and adapters in one place. The matcher
# composition function picks an InferenceCluster matching the claims and
# emits one ModelPlacement per logical replica (replica == placement).
# ModelPlacement is the existing CRD (apis/modelplacements/) playing the role
# of the intermediate representation between this user-facing CR and the
# rendered upstream objects (LLMInferenceService, etc.).
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: modeldeployments.modelplane.ai
spec:
  group: modelplane.ai
  names:
    categories: [crossplane, modelplane]
    kind: ModelDeployment
    plural: modeldeployments
    shortNames: [md]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      # Scale subresource — lets KEDA (or HPA / `kubectl scale`) drive the
      # number of logical replicas via `spec.replicas`. The composer reconciles
      # ModelPlacements to match: replica == placement, each placement carries
      # exactly one logical replica composed onto an InferenceCluster.
      subresources:
        status: {}
        scale:
          specReplicasPath: .spec.replicas
          statusReplicasPath: .status.replicas
          labelSelectorPath: .status.labelSelector
      additionalPrinterColumns:
        - name: READY
          type: string
          jsonPath: .status.conditions[?(@.type=='Ready')].status
        - name: MODEL
          type: string
          jsonPath: .spec.model.name
        - name: REPLICAS
          type: string
          jsonPath: .spec.replicas
        - name: PLACEMENTS
          type: string
          jsonPath: .status.placements.ready
        - name: AGE
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [model, source, deviceSelector, engine]
              # Field-level consumer index (every field on this CR has one):
              #   replicas               — KEDA writes; composer reconciles MPs
              #   model                  — engine adapter (--model arg); status reporting
              #   source / huggingFace   — engine adapter (model fetch at startup)
              #   clusterSelector        — federation matcher (filters ICs)
              #   deviceSelector         — federation matcher (filters pools);
              #                            backend adapter (in-cluster grounding via DRA)
              #   parallelism            — backend adapter (translates to backend-native
              #                            shape: KServe LWS, Dynamo graph, vLLM args);
              #                            matcher (excludes backends that can't honor it)
              #   roles                  — backend adapter (xPyD; renders separate prefill
              #                            and decode workloads); matcher (excludes
              #                            backends without disagg support)
              #   engine.{quantization,
              #           speculation,
              #           advanced[],
              #           args}          — backend adapter (engine flags); matcher
              #                            (excludes backends that can't honor them —
              #                            features required are derived from these)
              #   scaling                — composer (renders KEDA ScaledObject targeting
              #                            this MD's scale subresource)
              #   adapters               — backend adapter (engine LoRA load:
              #                            vLLM --lora-modules); gateway (LoRA-aware
              #                            request routing — match request adapter to
              #                            replica that has it loaded)
              #
              # Required-feature derivation. The matcher computes the engine-
              # feature set this MD requires from declared config (roles,
              # engine.*, parallelism, adapters) and matches the union against
              # the chosen InferenceCluster's KServeBackend.spec.engine.features.
              # Single source of truth: user declares what they want, not
              # which backend features that requires.
              properties:
                # ---- replica count (KEDA-writable via scale subresource) ----
                # Replica == placement. The composer reconciles `replicas`
                # ModelPlacements per ModelDeployment, each independently
                # scheduled by the matcher. KEDA writes here through the
                # scale subresource — no custom scaler needed.
                replicas:
                  type: integer
                  minimum: 0
                  default: 1
                  description: |
                    Number of logical replicas. Each replica == one
                    ModelPlacement composed onto an InferenceCluster. KEDA's
                    standard ScaledObject (composed from spec.scaling) writes
                    here.

                # ---- model identity ----
                model:
                  type: object
                  required: [name]
                  properties:
                    name:
                      type: string
                      description: Engine-facing model name (passed via --model).

                source:
                  type: string
                  enum: [HuggingFace, S3, GCS, PVC]
                huggingFace:
                  type: object
                  properties:
                    repo:     { type: string }
                    revision: { type: string }
                    secretRef:
                      type: object
                      properties:
                        name:      { type: string }
                        namespace: { type: string }

                # ---- two-level selector cascade ----
                # The matcher considers only InferenceCluster candidates.
                # ModelService is routing-only (never a placement target);
                # SaaS placement is a separate concept Nic owns.
                #
                # Federation-stage match (Modelplane control plane, pre-provisioning):
                # selectors evaluate predicates over declared pool attributes on
                # InferenceCluster.spec.nodePools[].{node,device}Attributes. We borrow
                # DRA's vocabulary (typed attributes, domain-prefixed keys, CEL) but
                # not its Kinds — no ResourceClaim / ResourceSlice at this layer.
                #
                # In-cluster grounding (per-cluster, at pod admission): the backend
                # adapter optionally emits real ResourceClaims carrying the same
                # predicates so the DRA driver validates against actual hardware.
                # Mandatory for BYOC clusters with DRA; optional for Modelplane-
                # provisioned clusters. Governed by InferenceCluster.spec.provisioning.mode.
                #
                # clusterSelector — filters InferenceCluster against env-level attrs
                # deviceSelector  — filters node pools' devices; matches both node-level
                #                  and device-level attributes uniformly (device attrs
                #                  are uniform across devices on a node).
                # matchTrace surfaces level-by-level exclusions with field-level reasons.

                clusterSelector:
                  type: object
                  description: Filters InferenceCluster candidates by env-level attributes.
                  properties:
                    matchLabels:
                      type: object
                      additionalProperties: { type: string }
                    matchAttributes:
                      type: object
                      additionalProperties:
                        x-kubernetes-preserve-unknown-fields: true
                      description: |
                        Matched against env-level attributes declared on the
                        InferenceCluster. Values may be scalars, lists, or
                        comparison strings (">=141Gi").
                    cel:
                      type: string
                      description: Break-glass — CEL over the cluster's declared attributes.

                deviceSelector:
                  type: object
                  description: |
                    Selectors over node + device attributes declared on
                    InferenceCluster.spec.nodePools[]. Uses DRA's typed-attribute
                    vocabulary (domain-prefixed keys, CEL) but evaluates against
                    declared pool capacity at federation time, not runtime
                    ResourceSlices. The K8s scheduler grounds these against actual
                    hardware in-cluster, when the cluster has a DRA driver.
                  required: [requests]
                  properties:
                    requests:
                      type: array
                      minItems: 1
                      items:
                        type: object
                        required: [name, count]
                        properties:
                          name: { type: string }
                          count:
                            type: integer
                            minimum: 1
                            description: Total devices needed (e.g. 16 for 2 nodes × 8 GPUs).
                          perNode:
                            type: integer
                            minimum: 1
                            description: Devices per node — together with `count` implies node count.
                          # Selector dual-path — labels first, attributes as break-glass:
                          #   matchLabels    — primary path. Plain K8s node labels.
                          #                    Works against any cluster with labeled
                          #                    nodes. No DRA required.
                          #   matchAttributes — break-glass for richer typed
                          #                    constraints (NVLink-domain co-location,
                          #                    MIG state, FP8 capability). Predicates
                          #                    over declared pool attributes; grounded
                          #                    via DRA in-cluster when available.
                          #   cel             — escape hatch for boolean / set
                          #                    arithmetic.
                          matchLabels:
                            type: object
                            additionalProperties: { type: string }
                            description: |
                              Primary match path. Plain K8s node labels —
                              works against any cluster with labeled nodes.
                              Sufficient for most workloads.
                          matchAttributes:
                            type: object
                            additionalProperties:
                              x-kubernetes-preserve-unknown-fields: true
                            description: |
                              Break-glass for richer typed constraints. Matched
                              against declared pool attributes (taxonomy keys:
                              vendor, product, vramGiB, capabilities, network.*,
                              cloud.instanceType, etc.; or acme.example/* user
                              keys). Grounded via real DRA ResourceClaims at pod
                              admission when the chosen cluster has a DRA driver.
                          cel:
                            type: string
                            description: Break-glass CEL — for constraints not expressible in matchLabels / matchAttributes.
                          constraints:
                            type: array
                            items:
                              type: object
                              properties:
                                matchAttribute:
                                  type: string
                                  description: |
                                    Co-location / topology constraint — e.g.
                                    "gpu.nvidia.com/nvlinkDomain" requires all
                                    devices in the same NVLink domain. Translated
                                    to a DRA constraint at the in-cluster grounding
                                    stage (when DRA is available).
                                requests:
                                  type: array
                                  items: { type: string }

                # ---- parallelism (Modelplane-canonical) ----
                # Tensor / pipeline / expert parallelism are Modelplane abstractions —
                # we promise to honor them across every backend we ship. The backend
                # adapter translates: KServe → LWS group + per-pod ranks, Dynamo →
                # the equivalent graph topology, raw-vllm → CLI args. Matcher excludes
                # any backend that can't honor the requested combination
                # (e.g. backends without expert-parallelism for MoE models).
                parallelism:
                  type: object
                  properties:
                    tensor:
                      type: integer
                      minimum: 1
                    pipeline:
                      type: integer
                      minimum: 1
                      default: 1
                    expert:
                      type: string
                      enum: [enabled, disabled]
                      default: disabled

                roles:
                  type: object
                  description: |
                    Optional. Presence enables disaggregated serving (xPyD).
                    Each role inherits root parallelism / deviceSelector if not
                    overridden; only `replicas` differs in the simple case.
                  properties:
                    prefill:
                      type: object
                      properties:
                        deviceSelector:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                        parallelism:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                        replicas: { type: integer, minimum: 1 }
                    decode:
                      type: object
                      properties:
                        deviceSelector:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                        parallelism:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                        replicas: { type: integer, minimum: 1 }

                # ---- engine ----
                engine:
                  type: object
                  required: [name, image]
                  properties:
                    name:
                      type: string
                      enum: [vLLM, SGLang, TensorRT-LLM, TGI]
                    image: { type: string }
                    args:
                      type: array
                      items: { type: string }
                    quantization:
                      type: object
                      properties:
                        precision:
                          type: string
                          enum: [bf16, fp8, mxfp8, int8, fp4, mxfp4, nvfp4, int4]
                        target:
                          type: array
                          items:
                            type: string
                            enum: [weights, activations, kvCache, attention]
                    speculation:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: [EAGLE, DraftTarget, Medusa, NGram, Lookahead]
                        eagle:
                          type: object
                          properties:
                            headRef:
                              type: object
                              properties:
                                kind: { type: string }
                                name: { type: string }
                        draftTarget:
                          type: object
                          properties:
                            draftModelRef:
                              type: object
                              properties:
                                kind: { type: string }
                                name: { type: string }
                            numSpeculativeTokens: { type: integer }
                        ngram:
                          type: object
                          properties:
                            n:                    { type: integer, minimum: 1 }
                            maxSpeculativeTokens: { type: integer, minimum: 1 }
                    optimizations:
                      type: object
                      description: |
                        Typed engine optimizations Modelplane recognizes and the
                        matcher derives required features from. Setting these
                        excludes backends that don't expose the corresponding
                        engine feature. Backend adapter translates to engine flags
                        (e.g. vLLM `--enable-chunked-prefill`, `--enable-prefix-caching`).
                      properties:
                        chunkedPrefill: { type: boolean }
                        prefixCaching:  { type: boolean }
                        kvCacheRouting:
                          type: boolean
                          description: |
                            Prefix-aware request routing in front of the engine —
                            gateway picks the replica that already has the prefix
                            cached. Implies the `kv-cache-routing` feature.
                    advanced:
                      type: array
                      description: |
                        Break-glass for novel knobs the IR doesn't model yet. Each
                        entry is a typed name; the matcher uses these names directly
                        when deriving required features. Promote frequently-used
                        names to `engine.optimizations` (typed) over time.
                      items:
                        type: object
                        required: [name]
                        properties:
                          name:   { type: string }
                          config:
                            type: object
                            x-kubernetes-preserve-unknown-fields: true

                # ---- scaling ----
                # The composer turns this into a stock KEDA ScaledObject that
                # targets the ModelDeployment via its scale subresource. KEDA
                # writes spec.replicas; the composer reconciles ModelPlacements
                # (one per replica) to match. Each replica is independently
                # scheduled by the matcher against clusterSelector.
                # Multi-region spread = multiple ModelDeployments + ModelEndpoint.
                scaling:
                  type: object
                  properties:
                    signal:
                      type: string
                      enum: [Concurrency, Utilization, Both]
                      default: Concurrency
                    concurrency:
                      type: object
                      properties:
                        minReplicas:
                          type: integer
                          minimum: 0
                          description: |
                            Lower bound on logical replicas. Each replica is one
                            ModelPlacement composing one LLMInferenceService.spec.replicas: 1.
                        maxReplicas:    { type: integer, minimum: 1 }
                        target:         { type: integer, minimum: 1 }
                        window:         { type: string, default: "60s" }
                        scaleDownDelay: { type: string, default: "300s" }

                # ---- LoRA adapters ----
                # Two consumers:
                #   1. Backend adapter: passes adapters into the engine at startup
                #      (e.g. vLLM `--lora-modules name=path` for each entry). Engine
                #      loads them and exposes them as servable model variants.
                #   2. Gateway / router: routes incoming requests carrying an adapter
                #      hint (`model: <md>:<adapter-name>` or header) to a replica
                #      that has the adapter loaded. LoRA-aware routing.
                # Required-feature derivation: presence of this list implies the
                # `multi-lora` engine feature is required; matcher excludes backends
                # that don't expose it.
                adapters:
                  type: array
                  items:
                    type: object
                    required: [name, source]
                    properties:
                      name: { type: string }
                      source:
                        type: object
                        properties:
                          huggingFace:
                            type: object
                            properties:
                              repo:     { type: string }
                              revision: { type: string }

            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:               { type: string }
                      status:             { type: string }
                      reason:             { type: string }
                      message:            { type: string }
                      lastTransitionTime: { type: string, format: date-time }
                # Required by the scale subresource. `replicas` mirrors
                # spec.replicas observed by the composer; `labelSelector` is
                # the selector that matches the deployment's ModelPlacements
                # (so HPA / KEDA can read pod counts via standard tooling).
                replicas:
                  type: integer
                labelSelector:
                  type: string
                placements:
                  type: object
                  properties:
                    total: { type: integer }
                    ready: { type: integer }
                matchTrace:
                  type: object
                  description: Per-fleet-member compatibility report; field-level reasons.
                  x-kubernetes-preserve-unknown-fields: true
