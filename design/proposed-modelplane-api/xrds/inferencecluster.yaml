# InferenceCluster — a customer Kubernetes cluster running a backend
# (KServe / Dynamo / raw-vllm) + an in-cluster scheduler (Kueue / KAI /
# Volcano) + DRA + KEDA. Each InferenceCluster is a workload plane;
# Modelplane composes ModelReplicas onto it.
#
# Replaces the existing InferenceEnvironment XRD. Pure substrate:
# cluster source, scheduler / backend pluggability, node pools, and
# three-layer attributes (Cluster / Pool / Device). The well-known
# attribute keys (vendor, product, vramGiB, capabilities, network.*,
# cloud.*, ...) are conventions in matcher code + docs; reusable
# hardware bundles live as InferenceClass CRs (StorageClass-style).
# No engine or runtime concerns — those live on the KServeBackend
# internal XR (apis/kservebackends/), which represents the inference
# stack installed on this cluster. The matcher reads engine features
# from the associated KServeBackend, not from here.
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: inferenceclusters.modelplane.ai
spec:
  group: modelplane.ai
  names:
    categories: [crossplane, modelplane]
    kind: InferenceCluster
    plural: inferenceclusters
    shortNames: [ic]
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      additionalPrinterColumns:
        - name: READY
          type: string
          jsonPath: .status.conditions[?(@.type=='Ready')].status
        - name: PROVISIONING
          type: string
          jsonPath: .spec.provisioning.mode
        - name: AGE
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [cluster, provisioning, scheduler, backend]
              properties:
                # ---- cluster source ----
                cluster:
                  type: object
                  required: [source]
                  properties:
                    source:
                      type: string
                      enum: [GKE, EKS, AKS, Existing]
                    gke:
                      type: object
                      properties:
                        project:     { type: string }
                        region:      { type: string }
                        clusterName: { type: string }
                    eks:
                      type: object
                      properties:
                        region:      { type: string }
                        clusterName: { type: string }
                    aks:
                      type: object
                      properties:
                        resourceGroup: { type: string }
                        clusterName:   { type: string }
                    existing:
                      type: object
                      properties:
                        secretRef:
                          type: object
                          required: [name, key]
                          properties:
                            name:      { type: string }
                            namespace: { type: string }
                            key:       { type: string }

                # ---- in-cluster device exposure mode ----
                # DRA is optional — federation match never reads runtime
                # ResourceSlices. Pick the mode that matches what the cluster
                # has installed.
                #
                # `device-plugin`: default for BYOC. Backend adapter constrains
                #   pods via nodeSelector (from deviceSelector.matchLabels) +
                #   the device-plugin resource (e.g. nvidia.com/gpu: <count>).
                #   Drift detection without DRA: trust the InferenceClass, or
                #   compare declared deviceAttributes against NVIDIA GPU
                #   operator / NFD node labels via a drift controller.
                # `dra`: opt-in. K8s 1.34+ with a DRA driver. Adapter emits
                #   real ResourceClaims carrying the same CEL predicates from
                #   deviceSelector — strongest grounding, catches drift /
                #   typos / mis-config at pod admission.
                # `hybrid`: cluster has DRA but some pools stay on
                #   device-plugin. Per-pool selection.
                provisioning:
                  type: object
                  required: [mode]
                  properties:
                    mode:
                      type: string
                      enum: [dra, device-plugin, hybrid]

                # ---- in-cluster scheduler ----
                # What admission / scheduling system runs on this cluster.
                # Modelplane ships adapters for both KAI and Kueue; both are
                # first-class.
                #
                # `auto` (default): Modelplane resolves at reconcile time.
                #   - Modelplane-provisioned NVIDIA pools → `managed-kai`
                #     (richer fleet signal — gang health, fair-share,
                #     hierarchical projects — useful for fleet behaviors).
                #   - Modelplane-provisioned non-NVIDIA pools → `managed-kueue`.
                #   - BYOC: detect existing install (KAI Projects CRD or Kueue
                #     ClusterQueue CRD); use what's there; install
                #     managed-kueue if neither.
                # `managed-kai` / `managed-kueue`: explicit Modelplane-installed.
                # `kai` / `kueue` / `volcano`: operator brought their own.
                # `none`: no admission control (kube-scheduler best-effort).
                scheduler:
                  type: object
                  required: [type]
                  properties:
                    type:
                      type: string
                      enum: [auto, managed-kai, managed-kueue, kai, kueue, volcano, none]
                      default: auto

                # ---- inference backend (orchestrator) ----
                # What renders ModelReplica (the intermediate representation)
                # into upstream objects.
                # `managed-kserve` means Modelplane installs KServe at `version`
                # + composes a KServeBackend; `kserve` / `dynamo` / `raw-vllm`
                # mean operator brought their own; `none` is invalid (cluster
                # must have a backend to host placements).
                backend:
                  type: object
                  required: [type]
                  properties:
                    type:
                      type: string
                      enum: [managed-kserve, kserve, dynamo, raw-vllm]
                    version:
                      type: string
                      description: |
                        Backend version pin (e.g. KServe v0.18.0). The matching
                        adapter is selected from this; absorbs upstream schema
                        churn (KServe v0.17 args→command, v0.18 storage migration).

                # ---- Cluster-layer attributes ----
                # Env-level facts about the whole cluster: cloud.{provider, region},
                # network.{fabric, bandwidthGbps, airgapped}, cluster.scaleUnit,
                # plus modelplane.ai/* keys (tier, compliance, billingModel) and
                # pass-through user keys (acme.example/*).
                # Filtered by ModelDeployment.clusterSelector at federation time.
                attributes:
                  type: object
                  additionalProperties:
                    x-kubernetes-preserve-unknown-fields: true
                  description: |
                    Cluster-layer attributes from the unified taxonomy.
                    Well-known keys are conventions in matcher code + docs;
                    user-defined `acme.example/*` keys pass through unvalidated.

                # Engine + features intentionally NOT here — they live on the
                # associated KServeBackend (apis/kservebackends/) which represents
                # the inference stack installed on this cluster. Substrate / runtime
                # split: this CR is hardware; KServeBackend is runtime. A cluster
                # may have multiple KServeBackends (e.g. vLLM + SGLang side-by-side).

                # ---- node pools ----
                nodePools:
                  type: array
                  items:
                    type: object
                    required: [name]
                    properties:
                      name: { type: string }

                      # Optional reference to an InferenceClass — bundles the
                      # Pool + Device hardware attributes (vendor, product,
                      # vramGiB, capabilities, gpuCount, interconnect, ...).
                      # Inline nodeAttributes / deviceAttributes still work
                      # alongside and override / supplement the class.
                      class:
                        type: string
                        description: Name of an InferenceClass.

                      # nodeSelector — labels the composer uses to constrain pods
                      # to this pool's nodes. Modelplane-provisioned pools auto-apply
                      # `modelplane.ai/pool: <name>`. BYO pools require the operator
                      # to label their nodes themselves (or use cloud-provider native
                      # labels like cloud.google.com/gke-nodepool, eks.amazonaws.com/nodegroup).
                      nodeSelector:
                        type: object
                        additionalProperties: { type: string }

                      # provisioning is for creating the pool (CSP-specific)
                      provisioning:
                        type: object
                        properties:
                          gke:
                            type: object
                            properties:
                              machineType: { type: string }
                              gpu:
                                type: object
                                properties:
                                  type:  { type: string }
                                  count: { type: integer }
                              autoscaling:
                                type: object
                                properties:
                                  min: { type: integer, minimum: 0 }
                                  max: { type: integer, minimum: 0 }
                          eks:
                            type: object
                            properties:
                              instanceType: { type: string }
                              capacityType: { type: string, enum: [on-demand, spot] }

                      # ---- Pool-layer attributes ----
                      # Per-host shape, uniform across nodes in this pool:
                      # cloud.instanceType, gpuCount, interconnect.{type,
                      # bandwidthGBs}, cpu.{vendor, cores, platform}, memoryGiB,
                      # nics.{count, bandwidthGbps}, host.virtualization.
                      # Filtered by ModelDeployment.deviceSelector at federation time.
                      nodeAttributes:
                        type: object
                        additionalProperties:
                          x-kubernetes-preserve-unknown-fields: true

                      # ---- Device-layer attributes ----
                      # Per-GPU, uniform across the pool's devices:
                      # vendor, product, architecture, formFactor, vramGiB, mig,
                      # capabilities (set), parentProduct (for fractional / MIG
                      # entries). Authoritative for federation-time matching.
                      # Optionally grounded against runtime DRA ResourceSlices
                      # at the in-cluster scheduling stage.
                      deviceAttributes:
                        type: object
                        additionalProperties:
                          x-kubernetes-preserve-unknown-fields: true

            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:               { type: string }
                      status:             { type: string }
                      reason:             { type: string }
                      message:            { type: string }
                      lastTransitionTime: { type: string, format: date-time }
                # Capacity signal — populated by a per-scheduler signal adapter
                # so the matcher can avoid placing replicas on saturated clusters.
                # Sources by spec.scheduler.type:
                #   managed-kueue / kueue → ClusterQueue.status.flavorsUsage[]
                #   kai                   → KAI Queue / ResourcePool .status
                #   volcano               → Volcano Queue.status
                #   none                  → direct cluster query (list nodes +
                #                           sum allocatable − requests)
                # Eventually consistent; few-seconds stale is acceptable for
                # federation-time decisions (we don't reserve, we admit and
                # let in-cluster scheduling handle final binding).
                capacity:
                  type: object
                  properties:
                    pools:
                      type: array
                      items:
                        type: object
                        properties:
                          name: { type: string }
                          # Per-resource-flavor capacity. Resource names
                          # follow K8s conventions (nvidia.com/gpu,
                          # amd.com/gpu, cpu, memory).
                          resources:
                            type: array
                            items:
                              type: object
                              properties:
                                name:      { type: string }
                                total:     { type: string }
                                used:      { type: string }
                                available: { type: string }
                          lastObserved:
                            type: string
                            format: date-time
                gateway:
                  type: object
                  properties:
                    address: { type: string }
