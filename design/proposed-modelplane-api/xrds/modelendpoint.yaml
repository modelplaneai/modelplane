# ModelEndpoint — weighted routing across ModelDeployments. Per #60.
#
# Decouples routing (what users hit) from deployment (what runs). Enables
# canary, A/B, and hybrid SaaS routing.
#
# A `Deployment` route refers to a ModelDeployment, NOT a single replica or
# placement: when traffic is sent to that route, it spreads across ALL the
# MD's ModelReplicas (every replica, on every InferenceCluster the matcher
# put them on). Replicas inside a placement are fungible — KServe + KEDA +
# the cluster Service round-robin across pods. Cross-cluster spread of one
# logical service happens via multiple MDs + multiple route entries here.
#
# Three route target types — each supports `ref` (explicit) or
# `selector.matchLabels` (label-based). Label-based is the natural way
# to express environment promotion: `modelplane.ai/environment: prod`
# on the MD, route selector picks up whichever MD currently has that
# label, the URL stays stable as you rev MDs.
#
#   Deployment        — references a ModelDeployment. Covers all of
#                       its placements transitively (this is how an
#                       MD's replicas across clusters/regions all get
#                       traffic).
#   InferenceProvider — routing to a SaaS / observed endpoint (Together,
#                       Bedrock, etc.). Never a placement target.
#   External          — ad-hoc URL not registered as an InferenceProvider.
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: modelendpoints.modelplane.ai
spec:
  group: modelplane.ai
  names:
    categories: [crossplane, modelplane]
    kind: ModelEndpoint
    plural: modelendpoints
    shortNames: [me]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      additionalPrinterColumns:
        - name: READY
          type: string
          jsonPath: .status.conditions[?(@.type=='Ready')].status
        - name: ADDRESS
          type: string
          jsonPath: .status.address
        - name: AGE
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [routes]
              properties:
                routes:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [type]
                    properties:
                      type:
                        type: string
                        enum: [Deployment, InferenceProvider, External]
                      weight:
                        type: integer
                        minimum: 0
                        maximum: 100
                        default: 1
                      # ---- Deployment: route to a ModelDeployment ----
                      # Composer resolves: MD → all its ModelReplicas (one
                      # per replica) → cluster-side Service per placement. The
                      # route's weight applies to the deployment as a whole;
                      # KServe + KEDA + the cluster Service round-robin across
                      # the deployment's pod replicas.
                      deployment:
                        type: object
                        properties:
                          # Explicit ref — most common case (canary v1 vs v2,
                          # multi-region with one MD per region).
                          ref:
                            type: object
                            required: [name]
                            properties:
                              namespace: { type: string }
                              name:      { type: string }
                          # Label selector — power-user case (e.g. "all canary
                          # deployments of this model family").
                          selector:
                            type: object
                            properties:
                              matchLabels:
                                type: object
                                additionalProperties: { type: string }
                      # ---- InferenceProvider: route to a SaaS / observed endpoint ----
                      # Routing-only; InferenceProvider is never a placement target.
                      # Same selection options as Deployment: explicit `ref`
                      # for single-target, `selector.matchLabels` for label-
                      # based selection (e.g. all spillover providers, or
                      # all providers in a given region — keeps the route
                      # stable as providers are added / cycled).
                      inferenceProvider:
                        type: object
                        properties:
                          ref:
                            type: object
                            required: [name]
                            properties:
                              namespace: { type: string }
                              name:      { type: string }
                          selector:
                            type: object
                            properties:
                              matchLabels:
                                type: object
                                additionalProperties: { type: string }
                      # ---- External: ad-hoc URL not registered as an InferenceProvider ----
                      external:
                        type: object
                        properties:
                          url: { type: string }
                          secretRef:
                            type: object
                            properties:
                              name:      { type: string }
                              namespace: { type: string }

            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:               { type: string }
                      status:             { type: string }
                      reason:             { type: string }
                      message:            { type: string }
                      lastTransitionTime: { type: string, format: date-time }
                address:
                  type: string
                  description: External address of the endpoint (HTTP URL).
                routes:
                  type: array
                  description: Per-route resolution status (matched placements, weights applied).
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
