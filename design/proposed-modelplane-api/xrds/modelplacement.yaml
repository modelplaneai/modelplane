# ModelPlacement — the existing CRD in apis/modelplacements/, expanded here
# to play the role of the **intermediate representation (IR)** between
# ModelDeployment (user-facing) and the rendered upstream object (KServe
# LLMInferenceService, DynamoGraphDeployment, etc.). The IR isn't a new
# abstraction — it's the role this existing CRD plays.
#
# Replica == placement. One ModelPlacement per logical replica of a
# ModelDeployment, owned by it. Each MP composes one LLMInferenceService
# (or backend equivalent) with spec.replicas: 1 onto a chosen
# InferenceCluster. The matcher composition function picks where each MP
# lands by evaluating the parent MD's claims against InferenceCluster
# candidates. The version-pinned backend adapter watches the MP and renders
# the upstream object. Multi-node logical replicas (e.g. Kimi K2 with PP=2)
# are still ONE MP — multi-pod via LWS within one cluster.
#
# ModelService is NEVER a ModelPlacement target — it's routing-only.
# Platform-internal-by-convention. ML/App teams shouldn't create these directly.
# IR schema absorbs upstream backend schema churn; user-facing types stay stable.
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: modelplacements.modelplane.ai
spec:
  group: modelplane.ai
  names:
    categories: [crossplane, modelplane]
    kind: ModelPlacement
    plural: modelplacements
    shortNames: [mp]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      additionalPrinterColumns:
        - name: READY
          type: string
          jsonPath: .status.conditions[?(@.type=='Ready')].status
        - name: TARGET
          type: string
          jsonPath: .spec.target.name
        - name: KIND
          type: string
          jsonPath: .spec.target.kind
        - name: AGE
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [target, model, topology, engine]
              properties:
                # ---- which cluster this replica lands on ----
                target:
                  type: object
                  required: [kind, name]
                  properties:
                    kind:
                      type: string
                      enum: [InferenceCluster]   # ModelService never a placement target
                    name: { type: string }
                    pool:
                      type: string
                      description: Node pool within the cluster.

                # ---- which logical replica this placement is ----
                replicaIndex:
                  type: integer
                  minimum: 0
                  description: |
                    Index of this replica within its parent ModelDeployment
                    (0 to spec.replicas-1). Stable across reconciles.

                # ---- resolved fields from the parent ModelDeployment ----
                model:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                # Resolved clusterSelector / deviceSelector (from the parent
                # ModelDeployment, with role overrides merged in if any).
                clusterSelector:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                deviceSelector:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                # Required-feature set derived by the matcher from the parent
                # MD's declared config (roles, engine.{quantization, speculation,
                # optimizations, advanced[]}, parallelism, adapters[]). Carried
                # on the IR so the backend adapter can verify support before
                # rendering. Not user-authored.
                derivedFeatures:
                  type: array
                  items: { type: string }
                parallelism:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                roles:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                engine:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true

                # ---- in-cluster grounding (DRA, optional) ----
                resourceClaim:
                  type: object
                  description: |
                    Real DRA ResourceClaim spec the backend adapter emits onto
                    the chosen cluster, carrying the predicates from
                    deviceSelector. Lets the cluster's DRA driver ground them
                    against actual hardware at pod admission. Empty when the
                    cluster lacks a DRA driver (provisioning.mode: device-plugin)
                    or when grounding is opted out.
                  properties:
                    deviceClassName: { type: string }
                    count:           { type: integer, minimum: 1 }
                    selectors:
                      type: array
                      items:
                        type: object
                        properties:
                          cel: { type: string }
                    constraints:
                      type: array
                      items:
                        type: object
                        properties:
                          matchAttribute: { type: string }
                          requests:
                            type: array
                            items: { type: string }

                # ---- adapter hint ----
                kserveVersion:
                  type: string
                  description: |
                    Version of KServe LLMInferenceService schema the adapter must
                    target. Detected from the InferenceCluster fingerprint.

            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:               { type: string }
                      status:             { type: string }
                      reason:             { type: string }
                      message:            { type: string }
                      lastTransitionTime: { type: string, format: date-time }
                matchTrace:
                  type: object
                  description: Why this placement was chosen; per-claim evaluation.
                  x-kubernetes-preserve-unknown-fields: true
                rendered:
                  type: object
                  description: |
                    Reference to the upstream object the backend adapter
                    produced. This is the seam between the IR and the
                    pluggable backend — KServe adapter renders an
                    LLMInferenceService here; Dynamo adapter renders a
                    DynamoGraphDeployment; raw-vllm adapter renders a
                    plain Deployment + Service.
                  properties:
                    apiVersion: { type: string }
                    kind:       { type: string }
                    name:       { type: string }
                endpoint:
                  type: object
                  properties:
                    internalURL: { type: string }
