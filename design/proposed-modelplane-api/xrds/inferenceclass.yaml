# InferenceClass — a named bundle of hardware capabilities (Pool + Device
# attributes) that an InferenceCluster's nodePool can reference instead of
# spelling out attributes inline. StorageClass / IngressClass / DeviceClass
# pattern.
#
# Cluster-scoped, like the K8s precedents. Modelplane ships a default set
# (one per known SKU: H100-NVL-8x, B200-NVL-8x, MI300X-8x, ...). Customers
# author their own for bespoke hardware.
#
# Used two ways:
#   1. Pool reference — InferenceCluster.spec.nodePools[].class names this.
#      Matcher inherits class.expands into the pool's effective attributes.
#      Inline pool attributes still work and override / supplement.
#   2. SKU resolution — class.aliases[] lists per-cloud SKU strings (e.g.
#      aws:p5.48xlarge). A nodePool that declares cloud.instanceType: <sku>
#      can be resolved to its class via these aliases.
#
# DRA fill (future): on clusters that have a DRA driver, a controller can
# auto-populate or auto-select the InferenceClass for a nodePool by
# introspecting ResourceSlices. For Modelplane-provisioned clusters the
# class is known from the SKU we asked for.
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: inferenceclasses.modelplane.ai
spec:
  group: modelplane.ai
  names:
    categories: [crossplane, modelplane]
    kind: InferenceClass
    plural: inferenceclasses
    shortNames: [ic-class]
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      additionalPrinterColumns:
        - name: PRODUCT
          type: string
          jsonPath: .spec.expands.product
        - name: GPUS
          type: integer
          jsonPath: .spec.expands.gpuCount
        - name: VRAM
          type: integer
          jsonPath: .spec.expands.vramGiB
        - name: AGE
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [expands]
              properties:
                description:
                  type: string

                # Typed attributes the class implies. Same well-known keys
                # used in InferenceCluster.spec.nodePools[].{node,device}Attributes
                # — vendor, product, architecture, formFactor, vramGiB, mig,
                # capabilities, gpuCount, interconnect.{type, bandwidthGBs}, ...
                # Conventions in the matcher; user keys (acme.example/*)
                # are pass-through.
                expands:
                  type: object
                  additionalProperties:
                    x-kubernetes-preserve-unknown-fields: true

                # Per-cloud SKU strings that resolve to this class.
                # aws:p5.48xlarge, gcp:a3-megagpu-8g, oci:BM.GPU.H100.8, etc.
                aliases:
                  type: array
                  items: { type: string }

                since:
                  type: string

            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:               { type: string }
                      status:             { type: string }
                      reason:             { type: string }
                      message:            { type: string }
                      lastTransitionTime: { type: string, format: date-time }
