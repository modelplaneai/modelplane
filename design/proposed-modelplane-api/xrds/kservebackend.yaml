# KServeBackend — proposed extension to the existing internal XR
# (apis/kservebackends/definition.yaml). This file mirrors the current
# shape and adds `spec.engine.features` so the matcher has a per-cluster
# source of truth for engine-feature support. Lands in
# apis/kservebackends/definition.yaml alongside this design.
#
# What's added vs. main:
#   - spec.engine.features (list of well-known feature names)
#
# Everything else (spec.secrets, spec.versions, spec.gateway, status.*)
# matches the existing XRD verbatim.
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: kservebackends.infrastructure.modelplane.ai
spec:
  group: infrastructure.modelplane.ai
  names:
    categories:
    - crossplane
    - modelplane
    kind: KServeBackend
    plural: kservebackends
    shortNames:
    - ksb
  scope: Namespaced
  versions:
  - name: v1alpha1
    referenceable: true
    additionalPrinterColumns:
    - name: READY
      type: string
      jsonPath: .status.conditions[?(@.type=='Ready')].status
    - name: KSERVE
      type: string
      jsonPath: .spec.versions.kserve
    - name: GATEWAY
      type: string
      jsonPath: .status.gateway.address
    - name: AGE
      type: date
      jsonPath: .metadata.creationTimestamp
    schema:
      openAPIV3Schema:
        description: >-
          A KServeBackend installs the full KServe inference backend on a
          Kubernetes cluster, including cert-manager, Gateway API, Envoy
          Gateway, LeaderWorkerSet, and KServe itself. spec.engine
          declares which engine features the cluster's KServe install
          supports — read by Modelplane's matcher to filter
          InferenceCluster candidates per ModelDeployment.
        properties:
          spec:
            description: KServeBackendSpec defines the desired state of KServeBackend.
            required:
            - secrets
            properties:
              secrets:
                type: array
                description: >-
                  Secrets used to authenticate to the target cluster. Typically
                  sourced from a GKECluster's status.secrets. All secrets must
                  be in the same namespace as this KServeBackend. A Kubeconfig
                  secret is required. If a cloud-specific credential secret is
                  present (e.g. GCPServiceAccountKey), the ProviderConfigs
                  will use it for identity-based authentication instead of
                  relying on the kubeconfig's embedded credentials.
                minItems: 1
                items:
                  type: object
                  required:
                  - type
                  - name
                  - key
                  properties:
                    type:
                      type: string
                      description: >-
                        The type of credential this secret contains. Kubeconfig
                        is required. Cloud-specific types are optional and
                        determine how the ProviderConfigs authenticate.
                      enum:
                      - Kubeconfig
                      - GCPServiceAccountKey
                    name:
                      type: string
                      description: Name of the Secret.
                      maxLength: 253
                    key:
                      type: string
                      description: Key within the Secret that holds the credential data.
                      maxLength: 253
              versions:
                type: object
                description: >-
                  Version pins for each component. Defaults are the latest
                  tested combination. Override individual versions to upgrade
                  components independently.
                properties:
                  kserve:
                    type: string
                    default: "v0.16.0"
                    description: KServe LLMInferenceService chart version.
                    minLength: 1
                    maxLength: 32
                  certManager:
                    type: string
                    default: "v1.17.1"
                    description: cert-manager chart version.
                    minLength: 1
                    maxLength: 32
                  envoyGateway:
                    type: string
                    default: "v1.3.0"
                    description: Envoy Gateway chart version.
                    minLength: 1
                    maxLength: 32
                  keda:
                    type: string
                    default: "2.17.1"
                    description: KEDA chart version.
                    minLength: 1
                    maxLength: 32
                  prometheus:
                    type: string
                    default: "72.6.2"
                    description: kube-prometheus-stack chart version.
                    minLength: 1
                    maxLength: 32
                  leaderWorkerSet:
                    type: string
                    default: "v0.7.0"
                    description: LeaderWorkerSet chart version.
                    minLength: 1
                    maxLength: 32

              # ---- proposed extension: engine feature declarations ----
              # Read by Modelplane's matcher at federation time. The
              # required-feature set for each ModelDeployment (derived
              # from declared config — roles, engine.optimizations.*,
              # adapters[], engine.advanced[].name, etc.) is matched
              # against this list. If the workload requires features
              # not in `features`, the cluster is excluded.
              #
              # Authored declaratively for `byo-kserve` (operator
              # writes it). Composed by Modelplane for `managed-kserve`
              # (we know what we installed).
              #
              # Feature names are the canonical Modelplane vocabulary
              # (chunked-prefill, prefix-caching, multi-lora, ...) plus
              # custom names for engine forks (e.g. acme.com/turbo-mode)
              # — break-glass, no registration required.
              engine:
                type: object
                properties:
                  features:
                    type: array
                    description: >-
                      Engine features this cluster's KServe install
                      supports. Union across whatever engines are
                      available — vLLM, SGLang, etc. — to keep
                      federation matching simple.
                    items:
                      type: string

              gateway:
                type: object
                description: >-
                  Configuration for the cluster's inference traffic gateway.
                properties:
                  className:
                    type: string
                    default: envoy
                    description: >-
                      GatewayClass name. Override if the cluster already has a
                      GatewayClass named envoy.
                    minLength: 1
                    maxLength: 63
                  listeners:
                    type: array
                    description: >-
                      Gateway listeners. Defaults to a single HTTP listener on
                      port 80 if not specified.
                    maxItems: 8
                    x-kubernetes-list-type: map
                    x-kubernetes-list-map-keys:
                    - name
                    items:
                      type: object
                      required:
                      - name
                      - port
                      - protocol
                      properties:
                        name:
                          type: string
                          description: Unique listener name.
                          maxLength: 63
                          minLength: 1
                        port:
                          type: integer
                          description: Port number for this listener.
                          minimum: 1
                          maximum: 65535
                        protocol:
                          type: string
                          description: Protocol for this listener.
                          enum:
                          - HTTP
                          - TCP
            type: object
          status:
            description: KServeBackendStatus defines the observed state of KServeBackend.
            properties:
              gateway:
                type: object
                description: Status of the cluster's inference gateway.
                properties:
                  address:
                    type: string
                    maxLength: 256
                    description: >-
                      The gateway's external address, once assigned by the
                      cloud load balancer.
            type: object
        required:
        - spec
        type: object
    served: true
