# InferenceProvider — a SaaS or external inference endpoint (Together,
# Baseten, Bedrock, customer-run KServe). Routing-only — never a
# placement target.
#
# Why a CR instead of just a URL on ModelEndpoint:
#   - URL + auth alone could be a Secret + inline route field.
#   - But `attributes` (region / billing / tier) lets ModelEndpoint do
#     routing-time selection across multiple providers — that earns
#     the CR shape and makes the provider reusable across MEs.
#   - ModelEndpoint supports inline `routes[].external.url` for one-off
#     cases that don't want a CR.
#
# Namespace-scoped — sits alongside ModelDeployment / ModelEndpoint inside
# the namespace-as-environment lifecycle scope. Valid only as a route
# target on ModelEndpoint (alongside Deployment and External). The matcher
# does NOT consider InferenceProvider as a fleet-member candidate;
# clusterSelector filters only against InferenceCluster.
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: inferenceproviders.modelplane.ai
spec:
  group: modelplane.ai
  names:
    categories: [crossplane, modelplane]
    kind: InferenceProvider
    plural: inferenceproviders
    shortNames: [ip]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      additionalPrinterColumns:
        - name: READY
          type: string
          jsonPath: .status.conditions[?(@.type=='Ready')].status
        - name: ENDPOINT
          type: string
          jsonPath: .spec.endpoint.url
        - name: AGE
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [endpoint]
              properties:
                # ---- endpoint identity ----
                endpoint:
                  type: object
                  required: [url]
                  properties:
                    url:
                      type: string
                      description: OpenAI-compatible base URL.
                    auth:
                      type: object
                      properties:
                        secretRef:
                          type: object
                          required: [name, key]
                          properties:
                            name:      { type: string }
                            namespace: { type: string }
                            key:       { type: string }

                # ---- environment-level attributes ----
                # Used by the ModelEndpoint composer when picking which
                # InferenceProvider a route is referring to (e.g. region
                # selection among multiple Together / Bedrock instances).
                # NOT used by the matcher — InferenceProvider is never a
                # placement target.
                attributes:
                  type: object
                  additionalProperties:
                    x-kubernetes-preserve-unknown-fields: true
                  description: |
                    Same shape as InferenceCluster.spec.attributes (region, tier,
                    compliance, billingModel). Informational + addressable by
                    ModelEndpoint route logic.

            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:               { type: string }
                      status:             { type: string }
                      reason:             { type: string }
                      message:            { type: string }
                      lastTransitionTime: { type: string, format: date-time }
                lastHealthCheck:
                  type: string
                  format: date-time
