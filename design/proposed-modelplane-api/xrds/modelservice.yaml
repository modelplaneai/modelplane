# ModelService — a SaaS or observed inference endpoint (Together, Baseten,
# Bedrock, customer-run KServe). Routing-only — never a placement target.
#
# Rough sketch: a separate concept for *placement* against dedicated SaaS
# endpoints (programmatic provisioning of a Together / Baseten dedicated
# inference) is on Nic to define; this CR is intentionally narrow.
#
# Namespace-scoped — sits alongside ModelDeployment / ModelEndpoint inside
# the namespace-as-environment lifecycle scope. Valid only as a route target
# on ModelEndpoint (alongside Deployment and External). The matcher does NOT
# consider ModelService as a fleet-member candidate; clusterSelector filters
# only against InferenceCluster.
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: modelservices.modelplane.ai
spec:
  group: modelplane.ai
  names:
    categories: [crossplane, modelplane]
    kind: ModelService
    plural: modelservices
    shortNames: [ms]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      additionalPrinterColumns:
        - name: READY
          type: string
          jsonPath: .status.conditions[?(@.type=='Ready')].status
        - name: ENDPOINT
          type: string
          jsonPath: .spec.endpoint.url
        - name: AGE
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [endpoint]
              properties:
                # ---- endpoint identity ----
                endpoint:
                  type: object
                  required: [url]
                  properties:
                    url:
                      type: string
                      description: OpenAI-compatible base URL.
                    auth:
                      type: object
                      properties:
                        secretRef:
                          type: object
                          required: [name, key]
                          properties:
                            name:      { type: string }
                            namespace: { type: string }
                            key:       { type: string }

                # ---- environment-level attributes ----
                # Used by the ModelEndpoint composer when picking which
                # ModelService a route is referring to (e.g. region selection
                # among multiple Together / Bedrock instances). NOT used by
                # the matcher — ModelService is never a placement target.
                attributes:
                  type: object
                  additionalProperties:
                    x-kubernetes-preserve-unknown-fields: true
                  description: |
                    Same shape as InferenceCluster.spec.attributes (region, tier,
                    compliance, billingModel, networkAccess). Informational +
                    addressable by ModelEndpoint route logic.

                # ---- catalog of models this service serves ----
                # Consumed by the ModelEndpoint composer for route filtering:
                # when a request targets model X, ME can only route to a
                # ModelService whose supportedModels contains X. Without this
                # the user has to keep ME and MS in sync manually.
                #
                # Auto-refresh plan: a controller polls the SaaS catalog API
                # (`GET /v1/models` for OpenAI-compatible providers) and updates
                # the field. Operator-maintained as a fallback for providers
                # without a public catalog endpoint.
                supportedModels:
                  type: array
                  items: { type: string }
                  description: |
                    Canonical model names (HuggingFace IDs or provider-native).
                    Auto-refreshed by a controller from the provider's catalog
                    API where available; operator-maintained otherwise.

            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:               { type: string }
                      status:             { type: string }
                      reason:             { type: string }
                      message:            { type: string }
                      lastTransitionTime: { type: string, format: date-time }
                lastHealthCheck:
                  type: string
                  format: date-time
