# Kimi K2 — frontier MoE, multi-node, disaggregated prefill/decode
#
# Demonstrates:
#   - Two-level selector cascade (federation-stage match):
#       clusterSelector: filters InferenceCluster by env-level attrs
#       deviceSelector:  matches node + device attrs via the typed
#                        attribute predicate vocabulary (DRA-style, but
#                        evaluated against declared pool attributes)
#   - 16 devices per replica (count: 16, perNode: 8 → 2 nodes), constrained to
#     a single NVLink domain via matchAttribute (break-glass)
#   - Parallelism: TP=8 within node, PP=2 across nodes, expert parallelism for MoE
#     (Modelplane-canonical; backend adapter translates to KServe LWS / Dynamo
#      graph / vLLM args. Matcher excludes backends that can't honor it.)
#   - 5P3D disaggregation via roles.{prefill, decode} — implies the
#     `prefill-decode-disagg` engine feature; matcher excludes backends without it.
#   - engine.optimizations: chunkedPrefill + kvCacheRouting — typed knobs that
#     imply `chunked-prefill` and `kv-cache-routing` features.
#   - FP8 weight + KV cache quantization (engine.quantization) — implies
#     `fp8-kv-cache` engine feature.
#
# Required-feature derivation (no requiredEngineFeatures field needed):
#   roles present                                  → prefill-decode-disagg
#   engine.optimizations.chunkedPrefill: true      → chunked-prefill
#   engine.optimizations.kvCacheRouting: true      → kv-cache-routing
#   engine.quantization.target contains kvCache    → fp8-kv-cache
#   parallelism.expert: enabled                    → expert-parallelism
# Matcher unions these and matches against the cluster's
# KServeBackend.spec.engine.features. Single source of truth: declare what
# you want; matcher derives the runtime-feature requirement.
apiVersion: modelplane.ai/v1alpha1
kind: ModelDeployment
metadata:
  name: kimi-k2
  namespace: research
spec:
  replicas: 1                             # KEDA writes here via scale subresource

  model:
    name: moonshotai/Kimi-K2-Instruct
  source: HuggingFace
  huggingFace:
    repo: moonshotai/Kimi-K2-Instruct
    revision: main
    secretRef:
      namespace: platform-system
      name: hf-token

  clusterSelector:
    matchLabels:
      modelplane.ai/tier: production
      modelplane.ai/region: us-east

  deviceSelector:
    requests:
      - name: gpus
        count: 16                       # 2 nodes × 8 GPUs per replica
        perNode: 8
        matchAttributes:
          # Predicates over the unified-taxonomy vocab. Capability flags
          # (fp8) do the work, not architecture — keeps AMD MI300X eligible
          # if its fabric/VRAM also match. Architecture is metadata.
          vramGiB:        ">=141"
          capabilities:   [fp8]
          network.fabric: [ib, roce]
          network.bandwidthGbps: ">=400"
        constraints:
          - matchAttribute: gpu.nvidia.com/nvlinkDomain   # TP=8 in one NVLink domain
            requests: [gpus]

  parallelism:                          # Modelplane-canonical; backend adapter translates
    tensor: 8
    pipeline: 2
    expert: enabled

  roles:                                # 5P3D disaggregation; roles inherit root shape
    prefill: { replicas: 5 }
    decode:  { replicas: 3 }

  engine:
    name: vLLM
    image: vllm/vllm-openai:v0.8.0
    args:                               # backend adapter passes these straight through
      - "--max-model-len=131072"
      - "--gpu-memory-utilization=0.90"
      - "--max-num-seqs=256"
      - "--distributed-executor-backend=ray"
    quantization:                       # implies fp8-kv-cache feature (target=kvCache)
      precision: fp8
      target: [weights, kvCache]
    optimizations:                      # typed knobs; each implies a derived feature
      chunkedPrefill: true              # → chunked-prefill
      kvCacheRouting: true              # → kv-cache-routing (gateway prefix-aware routing)

  scaling:
    signal: Concurrency
    concurrency:
      minReplicas: 1
      maxReplicas: 4
      target: 32
      window: 60s
      scaleDownDelay: 600s
