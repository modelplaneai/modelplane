# Modelplane-provisioned GKE cluster — managed defaults end-to-end.
#
# Demonstrates the "Modelplane provisions" path:
#   - cluster.source: GKE — Modelplane creates / manages the GKE cluster
#     via the Google Cloud Crossplane provider (project + region + cluster
#     name resolve to a real GKE cluster).
#   - scheduler: managed-kueue — Modelplane installs Kueue + composes a
#     ClusterQueue per pool; reads ClusterQueue.status.flavorsUsage[] for
#     capacity signal.
#   - backend: managed-kserve at v0.18.0 — Modelplane installs KServe and
#     composes the cluster's KServeBackend.
#   - provisioning.mode: dra — modern GKE has the NVIDIA DRA driver
#     available; backend adapter emits real ResourceClaims for runtime
#     grounding.
#   - nodePools[].class: h100-nvl-8x — hardware bundle (vendor / product /
#     vramGiB / capabilities / gpuCount / interconnect) inherited from
#     the InferenceClass; per-cluster host shape (cpu, memory, autoscaling)
#     inline below.
#
# Pair with the BYOC examples (byoc-*.yaml in this directory) to see the
# managed-vs-BYO contrast across schedulers, backends, and DRA modes.
apiVersion: modelplane.ai/v1alpha1
kind: InferenceCluster
metadata:
  name: managed-gke-a3-us-central1
spec:
  cluster:
    source: GKE
    gke:
      project:     <fill-me-in>
      region:      us-central1
      clusterName: modelplane-prod

  provisioning:
    mode: dra

  scheduler:
    type: managed-kueue              # Modelplane installs Kueue

  backend:
    type: managed-kserve             # Modelplane installs KServe at v0.18.0
    version: v0.18.0

  attributes:
    cloud.provider:        gcp
    cloud.region:          us-central1
    network.fabric:        roce
    network.bandwidthGbps: 1800      # A3 Mega
    cluster.scaleUnit:     independent-nodes
    modelplane.ai/tier:    production

  nodePools:
    - name: a3-megagpu-8g
      class: h100-nvl-8x
      # Modelplane provisions this pool via the GKE node-pool API.
      # nodeSelector is auto-applied (`modelplane.ai/pool: a3-megagpu-8g`).
      provisioning:
        gke:
          machineType: a3-megagpu-8g
          autoscaling:
            min: 0                   # scale-to-zero pool
            max: 8
      # Per-cluster host shape (the GKE A3 Mega specifics).
      nodeAttributes:
        cloud.instanceType:  gcp:a3-megagpu-8g
        cpu.vendor:          intel
        cpu.cores:           104             # 208 vCPU
        cpu.platform:        sapphire-rapids
        memoryGiB:           1872
        host.virtualization: kvm
