# CoreWeave GB300 NVL72 — rack-scale Blackwell Ultra (B300) on Grace.
#
# Per-instance: 2 Grace CPUs + 4 B300 GPUs (2 superchips, 1 Grace + 2 B300
# each). Many such instances form one NVL72 rack — 72 B300 GPUs sharing
# one NVLink Switch domain. The addressable unit at the federation layer
# is the whole rack: cluster.scaleUnit: nvl72 captures that. The matcher
# can reason about the rack as a single capacity unit for placements that
# span the NVLink domain (e.g. very large MoE with PP across the rack).
apiVersion: modelplane.ai/v1alpha1
kind: InferenceCluster
metadata:
  name: coreweave-gb300-nvl72-reference
spec:
  attributes:
    cloud.provider:        coreweave
    cloud.region:          eu-west-1
    network.fabric:        ib                     # Quantum-X800 IB
    network.bandwidthGbps: 3200                   # per-instance: 4 GPUs × 800 Gb/s
    cluster.scaleUnit:     nvl72                  # rack-scale NVLink Switch domain
    modelplane.ai/tier:    production

  scheduler:
    type: managed-kueue
  backend:
    type: managed-kserve
    version: v0.18.0
  provisioning:
    mode: dra

  cluster:
    source: coreweave
    coreweave:
      region:      eu-west-1
      clusterName: <fill-me-in>

  nodePools:
    - name: gb300-4x
      nodeSelector:
        coreweave.com/instance-type: gb300-4x
        modelplane.ai/pool: gb300-4x
      # Per-instance shape: 2 superchips, each 1 Grace + 2 B300 = 4 GPUs total.
      nodeAttributes:
        cloud.instanceType:        coreweave:gb300-4x
        gpuCount:                  4                 # per-instance (rack-wide is 72)
        interconnect.type:         nvswitch          # NVLink Switch (rack-scale; see cluster.scaleUnit)
        interconnect.bandwidthGBs: 1800
        cpu.vendor:                nvidia-grace
        cpu.cores:                 144               # 2× 72-core Grace
        memoryGiB:                 960
        host.virtualization:       none              # bare metal
      deviceAttributes:
        vendor:        nvidia
        product:       B300
        architecture:  blackwell-ultra
        formFactor:    nvl
        vramGiB:       279
        capabilities:  [fp4, fp8, transformer-engine]
