apiVersion: modelplane.ai/v1alpha1
kind: InferenceClass
metadata:
  name: l40s-4x
spec:
  description: 4× NVIDIA L40S PCIe, 48 GiB GDDR6 per GPU, no NVLink.
  expands:
    vendor: nvidia
    product: L40S
    architecture: ada
    formFactor: pcie
    vramGiB: 48
    capabilities: [fp8]
    gpuCount: 4
    interconnect.type: pcie
  aliases:
    - aws:g6e.12xlarge
    - aws:g6e.24xlarge
    - oci:BM.GPU.L40S.4
  since: v0.1
