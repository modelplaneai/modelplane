apiVersion: modelplane.ai/v1alpha1
kind: InferenceClass
metadata:
  name: b200-grace-4x
spec:
  description: |
    4 GB200 GPUs per instance (Grace + Blackwell superchip form). Used in
    NVL72 racks; pair with cluster.scaleUnit: nvl72 on the InferenceCluster.
  expands:
    vendor: nvidia
    product: B200
    architecture: blackwell
    formFactor: nvl
    vramGiB: 192
    capabilities: [fp4, fp8, transformer-engine]
    gpuCount: 4
    interconnect.type: nvswitch
    interconnect.bandwidthGBs: 1800
    cpu.vendor: nvidia-grace
  aliases:
    - gcp:a4x-highgpu-4g
    - oci:BM.GPU.GB200.4
    - coreweave:gb200-4x
  since: v0.1
