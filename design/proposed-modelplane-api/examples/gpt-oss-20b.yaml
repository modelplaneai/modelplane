# gpt-oss-20b — small MoE, plain-label matching, scale-to-zero
#
# Demonstrates:
#   - Single-GPU deployment (20B MoE with ~3.6B active params; fits one device)
#   - Plain node-label matching via deviceSelector.matchLabels — labels
#     are the primary match path; no DRA required. Composer emits the pod with
#     nvidia.com/gpu: 1 + a nodeSelector.
#   - Scale-to-zero (`scaling.concurrency.minReplicas: 0`) for low-traffic /
#     dev workloads. spec.replicas is KEDA-managed; user authors scaling only.
#   - For multi-region spread, create a second ModelDeployment targeting a
#     different region and route across both via a ModelEndpoint (or compose
#     them via a Crossplane XR).
apiVersion: modelplane.ai/v1alpha1
kind: ModelDeployment
metadata:
  name: gpt-oss-20b
  namespace: app-team
spec:
  model:
    name: openai/gpt-oss-20b
  source: HuggingFace
  huggingFace:
    repo: openai/gpt-oss-20b

  clusterSelector:
    matchLabels:
      modelplane.ai/tier: production

  deviceSelector:
    requests:
      - name: gpus
        count: 1
        perNode: 1
        # Labels are the primary match path. For richer typed constraints
        # (NVLink-domain co-location, MIG slicing, etc.), use matchAttributes
        # over the typed-attribute vocabulary as the break-glass — see kimi-k2.yaml.
        matchLabels:
          nvidia.com/gpu.family: hopper

  parallelism:
    tensor: 1

  engine:
    name: vLLM
    image: vllm/vllm-openai:v0.8.0
    args:
      - "--max-model-len=131072"
      - "--gpu-memory-utilization=0.90"
      - "--max-num-seqs=64"
    optimizations:
      prefixCaching: true               # → prefix-caching feature

  scaling:
    signal: Concurrency
    concurrency:
      minReplicas: 0                    # scale-to-zero
      maxReplicas: 8
      target: 32
      window: 60s
      scaleDownDelay: 180s
