# Qwen3-Coder — code completion, n-gram speculation, multi-LoRA
#
# Demonstrates:
#   - Two-level selector cascade (clusterSelector + deviceSelector)
#   - 8 devices per replica in a single NVLink domain
#   - Parallelism: TP=8 + expert parallelism for MoE (Modelplane-canonical)
#   - n-gram speculation via engine.speculation (excels at code per
#     Inference Engineering Ch 5.2.4) — implies `ngram-speculation` feature.
#   - engine.optimizations.prefixCaching — implies `prefix-caching` feature.
#   - Long context (256K) — set via engine.args (backend adapter passthrough)
#   - User-defined attributes for team affinity / cost-center tracking
#     (matched via clusterSelector.matchAttributes — pass-through user keys)
#   - FP8 weight + KV quantization — implies `fp8-kv-cache` feature
#   - `adapters` block: two consumers — backend adapter (engine LoRA load,
#     vLLM --lora-modules) + gateway (LoRA-aware request routing matching
#     the request's adapter hint to a replica that has it loaded). Presence
#     of this list implies the `multi-lora` feature.
apiVersion: modelplane.ai/v1alpha1
kind: ModelDeployment
metadata:
  name: qwen3-coder
  namespace: app-team
spec:
  replicas: 1                             # KEDA writes here via scale subresource

  model:
    name: Qwen/Qwen3-Coder-480B-A35B-Instruct
  source: HuggingFace
  huggingFace:
    repo: Qwen/Qwen3-Coder-480B-A35B-Instruct

  clusterSelector:
    matchAttributes:
      modelplane.ai/tier:        production
      "acme.example/team":       dev-tools
      "acme.example/cost-center": engineering

  # Single-node TP=8 — all 8 GPUs on an HGX baseboard share one NVLink
  # Switch domain by construction. No separate co-location constraint needed.
  deviceSelector:
    requests:
      - name: gpus
        count: 8
        perNode: 8
        matchAttributes:
          vramGiB:           ">=141"
          capabilities:      [fp8]
          interconnect.type: [nvswitch, xgmi]

  parallelism:                          # Modelplane-canonical
    tensor: 8
    expert: enabled

  engine:
    name: vLLM
    image: vllm/vllm-openai:v0.8.0
    args:
      - "--max-model-len=262144"
      - "--gpu-memory-utilization=0.92"
      - "--max-num-seqs=128"
    quantization:                       # → fp8-kv-cache feature
      precision: fp8
      target: [weights, kvCache]
    speculation:                        # → ngram-speculation feature
      type: NGram
      ngram:
        n: 3
        maxSpeculativeTokens: 8
    optimizations:
      chunkedPrefill: true              # → chunked-prefill
      prefixCaching: true               # → prefix-caching

  scaling:
    signal: Concurrency
    concurrency:
      minReplicas: 1
      maxReplicas: 6
      target: 16
      window: 60s
      scaleDownDelay: 300s

  # Two consumers:
  #   1. Backend adapter: passes these into the engine at startup
  #      (vLLM --lora-modules name=path); engine loads them as servable variants.
  #   2. Gateway: LoRA-aware routing — request specifies adapter via
  #      `model: qwen3-coder:<adapter-name>` (or header), router picks a
  #      replica that has the adapter loaded.
  # Presence implies the `multi-lora` engine feature → matcher excludes
  # backends without it.
  adapters:
    - name: acme-style
      source:
        huggingFace:
          repo: acme/qwen3-coder-style-lora
    - name: legacy-cobol
      source:
        huggingFace:
          repo: acme/qwen3-coder-cobol-lora
    - name: terraform-modules
      source:
        huggingFace:
          repo: acme/qwen3-coder-tf-lora
