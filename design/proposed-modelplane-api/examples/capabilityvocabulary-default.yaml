# Default CapabilityVocabulary — installed by Modelplane.
#
# Cluster-scoped, singleton (name: default). One vocabulary per cluster — the
# InferenceClusters that declare attributes against this vocabulary are also
# cluster-scoped, so per-namespace overrides would create inconsistent
# evaluation of the same cluster's hardware semantics. Namespaces customize
# via Crossplane Compositions, not vocab redefinition.
#
# Aligned with the unified GPU taxonomy in @bassam's hardware survey
# (Notion: "GPU hardware survey and unified taxonomy", 2026-05-07).
# Four logical layers — Cluster (env), Pool (per-host shape), Device
# (per-GPU), and dynamic state (separate, not modeled here). Capability
# tags as sets, not boolean columns. Architecture is metadata; capability
# flags do the matching work (avoids hardcoding `architecture in [hopper,
# blackwell]` and excluding AMD).
#
# The matcher reads this CR to validate selectors, resolve "or-better"
# ordering, rewrite aliased keys, and validate engineFeatures strings.
apiVersion: modelplane.ai/v1alpha1
kind: CapabilityVocabulary
metadata:
  name: default
spec:
  attributeKeys:
    # ============================================================
    # Cluster layer — facts about the whole environment
    # ============================================================
    - name: cloud.provider
      type: enum
      # IaaS hyperscalers, neo-cloud GPU IaaS, on-prem, and SaaS inference
      # providers (latter used on ModelService for routing-target identity,
      # never on InferenceCluster).
      values:
        # Hyperscaler IaaS
        - { name: aws }
        - { name: gcp }
        - { name: azure }
        - { name: oci }
        # Neo-cloud GPU IaaS
        - { name: coreweave }
        - { name: crusoe }
        - { name: lambda }
        - { name: nebius }
        # SaaS inference providers (ModelService routing targets)
        - { name: togetherai }
        - { name: baseten }
        - { name: bedrock }
        - { name: fireworks }
        - { name: modal }
        # On-prem
        - { name: on-prem-dgx }
        - { name: on-prem-other }
    - name: cloud.region
      type: string
    - name: network.fabric
      type: enum
      values:
        - { name: ib }        # InfiniBand (NDR / Quantum-2 / Quantum-X800)
        - { name: roce }      # RoCE v2 over ConnectX (OCI's pattern)
        - { name: efa }       # AWS Elastic Fabric Adapter
        - { name: gvnic }     # GCP gVNIC
        - { name: standard }  # commodity Ethernet
    - name: network.bandwidthGbps
      type: integer
    - name: network.airgapped
      type: bool
    - name: cluster.scaleUnit
      type: enum
      values:
        - { name: independent-nodes }   # standard cloud SKUs
        - { name: superpod }            # NVIDIA DGX SuperPOD topology
        - { name: nvl72 }               # GB200/GB300 rack-scale, 72-GPU NVLink domain
    - name: modelplane.ai/tier
      type: enum
      values: [{ name: production }, { name: staging }, { name: development }]
    - name: modelplane.ai/billingModel
      type: enum
      values:
        - { name: per-gpu-hour }
        - { name: per-token }
        - { name: per-request }
        - { name: provisioned-throughput }
    - name: modelplane.ai/pricing
      type: enum
      values:
        - { name: on-demand }
        - { name: spot }
        - { name: reserved }
        - { name: committed }
    - name: modelplane.ai/compliance
      type: list

    # ============================================================
    # Pool layer — homogeneous-group host shape (per nodePool)
    # ============================================================
    - name: cloud.instanceType
      type: string                       # provider-specific SKU name
    - name: gpuCount
      type: integer                      # GPUs per host
    - name: interconnect.type
      type: enum
      values:
        - { name: nvswitch }
        - { name: nvlink-pairwise }
        - { name: nvlink-c2c }
        - { name: xgmi }                # AMD Infinity Fabric
        - { name: pcie }
        - { name: none }
    - name: interconnect.bandwidthGBs
      type: integer                      # per-direction
    - name: cpu.vendor
      type: enum
      values:
        - { name: intel }
        - { name: amd }
        - { name: nvidia-grace }
        - { name: ampere-arm }
    - name: cpu.cores
      type: integer                      # physical cores; vCPU is 2× on x86
    - name: cpu.platform
      type: string                       # sapphire-rapids, emerald-rapids, genoa, ...
    - name: memoryGiB
      type: integer                      # host RAM
    - name: nics.count
      type: integer
    - name: nics.bandwidthGbps
      type: integer                      # per-NIC
    - name: host.virtualization
      type: enum
      values:
        - { name: none }                # bare metal (CoreWeave, OCI, on-prem)
        - { name: kvm }
        - { name: hyperv }
        - { name: vmware }

    # ============================================================
    # Device layer — per-GPU attributes (uniform across pool's devices)
    # ============================================================
    - name: vendor
      type: enum
      values:
        - { name: nvidia }
        - { name: amd }
        - { name: google-tpu }
        - { name: aws-trainium }
        - { name: azure-maia }
    - name: product
      type: string                       # H100, H200, B200, B300, L40S, MI300X, ...
    - name: architecture
      type: enum                         # mostly metadata; prefer `capabilities` for matching
      values:
        - { name: hopper }
        - { name: blackwell }
        - { name: blackwell-ultra }
        - { name: ampere }
        - { name: ada }
        - { name: cdna3 }                # AMD MI300X
    - name: formFactor
      type: enum
      values:
        - { name: sxm }
        - { name: pcie }
        - { name: nvl }                  # GB200/GB300 superchip form
    - name: vramGiB
      type: integer                      # per-device; predicate matching (>=141)
    - name: mig
      type: bool                         # partitionable (H100/H200/A100)
    - name: capabilities
      type: set                          # tags: fp8, fp4, transformer-engine, mig, ...
    - name: parentProduct
      type: string                       # for fractional/MIG entries: pointer to underlying GPU

  # ============================================================
  # Engine features — required-feature set the matcher derives from
  # ModelDeployment config (roles, engine.{quantization, speculation,
  # optimizations, advanced[]}, parallelism, adapters[]) and matches
  # against each cluster's KServeBackend.spec.engine.features.
  # ============================================================
  engineFeatures:
    - { name: prefill-decode-disagg,    description: "Disaggregated prefill/decode (xPyD)" }
    - { name: kv-cache-routing,         description: "Prefix-aware request routing (gateway)" }
    - { name: prefix-caching,           description: "In-engine prefix cache" }
    - { name: chunked-prefill,          description: "Chunked prefill with continuous batching" }
    - { name: eagle-speculation,        description: "EAGLE speculative decoding" }
    - { name: draft-target-speculation, description: "Draft-target speculative decoding" }
    - { name: medusa-speculation,       description: "Medusa speculative decoding" }
    - { name: ngram-speculation,        description: "N-gram / lookahead speculation" }
    - { name: multi-lora,               description: "Multi-LoRA + LoRA-aware routing" }
    - { name: structured-output,        description: "Guided / constrained generation" }
    - { name: tool-calling,             description: "Function calling / tool-use parsing" }
    - { name: expert-parallelism,       description: "MoE expert parallelism (parallelism.expert: enabled)" }
    - { name: fp8-kv-cache,             description: "FP8 KV-cache quantization" }
    - { name: mxfp4-quantization,       description: "MXFP4 weight quantization (Blackwell-native)" }
    - { name: nvfp4-quantization,       description: "NVFP4 weight quantization (NVIDIA Blackwell)" }

  kvCacheTiers:
    - { name: G1, medium: device-vram, bandwidth: "TB/s",     scope: pod-local }
    - { name: G2, medium: host-ram,    bandwidth: "100GB/s",  scope: node-local }
    - { name: G3, medium: local-ssd,   bandwidth: "10GB/s",   scope: node-local }
    - { name: G4, medium: networked,   bandwidth: "GB/s",     scope: cluster-shared }

  aliases:
    # Standard K8s topology label is the actual source for region.
    - { from: cloud.region, to: topology.kubernetes.io/region }

  # ============================================================
  # Instance-type macros — canonical names that expand to typed
  # attributes. Customers match either on `cloud.instanceType:
  # H100-NVL-8x` or on unpacked attributes; same predicate engine,
  # the vocab does the unpacking. Per-cloud SKU strings (`aws:p5.48xlarge`)
  # resolve to the canonical name via `aliases`.
  #
  # Catalog drawn from @bassam's hardware survey (2026-05-07). New SKUs
  # land here without a Modelplane CRD bump. Keeping it current is the
  # high-leverage canonical work that anchors the managed-catalog
  # commercial offering.
  # ============================================================
  instanceTypes:
    # ---- NVIDIA Hopper (H100 / H200) ----
    - name: H100-NVL-8x
      expands:
        vendor: nvidia
        product: H100
        architecture: hopper
        formFactor: sxm
        vramGiB: 80
        mig: true
        capabilities: [fp8, transformer-engine, mig]
        gpuCount: 8
        interconnect.type: nvswitch
        interconnect.bandwidthGBs: 900
      aliases:
        - aws:p5.48xlarge
        - gcp:a3-highgpu-8g
        - gcp:a3-megagpu-8g
        - azure:Standard_ND96isr_H100_v5
        - oci:BM.GPU.H100.8
        - coreweave:gd-8xh100ib-i128
        - lambda:hgx-h100-sxm
        - dgx:DGX-H100
      since: v0.1

    - name: H200-NVL-8x
      expands:
        vendor: nvidia
        product: H200
        architecture: hopper
        formFactor: sxm
        vramGiB: 141
        mig: true
        capabilities: [fp8, transformer-engine, mig]
        gpuCount: 8
        interconnect.type: nvswitch
        interconnect.bandwidthGBs: 900
      aliases:
        - aws:p5e.48xlarge
        - aws:p5en.48xlarge
        - gcp:a3-ultragpu-8g
        - azure:Standard_ND96isr_H200_v5
        - oci:BM.GPU.H200.8
        - coreweave:gd-8xh200ib-i128
        - dgx:DGX-H200
      since: v0.1

    # ---- NVIDIA Blackwell (B200 / B300) ----
    - name: B200-NVL-8x
      expands:
        vendor: nvidia
        product: B200
        architecture: blackwell
        formFactor: sxm
        vramGiB: 180
        capabilities: [fp4, fp8, transformer-engine]
        gpuCount: 8
        interconnect.type: nvswitch
        interconnect.bandwidthGBs: 1800
      aliases:
        - aws:p6-b200.48xlarge
        - gcp:a4-highgpu-8g
        - oci:BM.GPU.B200.8
        - coreweave:b200-8x
        - lambda:hgx-b200-sxm6
        - dgx:DGX-B200
      since: v0.1

    # NVL72 macros are per-instance (Pool layer): 1 Grace + 2 Blackwell GPUs
    # per superchip, 2 superchips per node = 4 GPUs/node. Rack-scale topology
    # is NOT in the macro — it's declared at InferenceCluster.spec.attributes
    # via cluster.scaleUnit: nvl72 (Cluster layer). Many such instances form
    # one NVL72 rack, all sharing one NVLink Switch domain.
    - name: B300-Grace-4x
      expands:
        vendor: nvidia
        product: B300
        architecture: blackwell-ultra
        formFactor: nvl
        vramGiB: 279
        capabilities: [fp4, fp8, transformer-engine]
        gpuCount: 4
        interconnect.type: nvswitch          # NVLink Switch (rack-scale via cluster.scaleUnit)
        interconnect.bandwidthGBs: 1800
        cpu.vendor: nvidia-grace
      aliases:
        - aws:p6-b300
        - oci:BM.GPU.GB300.4
        - coreweave:gb300-4x
      since: v0.1

    - name: B200-Grace-4x
      expands:
        vendor: nvidia
        product: B200
        architecture: blackwell
        formFactor: nvl
        vramGiB: 192
        capabilities: [fp4, fp8, transformer-engine]
        gpuCount: 4
        interconnect.type: nvswitch
        interconnect.bandwidthGBs: 1800
        cpu.vendor: nvidia-grace
      aliases:
        - oci:BM.GPU.GB200.4
        - coreweave:gb200-4x
      since: v0.1

    # ---- AMD CDNA3 (MI300X) ----
    - name: MI300X-8x
      expands:
        vendor: amd
        product: MI300X
        architecture: cdna3
        formFactor: sxm
        vramGiB: 192
        capabilities: [fp8]              # no FP4 on MI300X
        gpuCount: 8
        interconnect.type: xgmi
        interconnect.bandwidthGBs: 128
      aliases:
        - azure:Standard_ND_MI300X_v5
        - oci:BM.GPU.MI300X.8
        - crusoe:mi300x-8x
      since: v0.1

    # ---- NVIDIA L40S / A100 / older ----
    - name: L40S-8x
      expands:
        vendor: nvidia
        product: L40S
        architecture: ada
        formFactor: pcie
        vramGiB: 48
        capabilities: [fp8]
        gpuCount: 8
        interconnect.type: pcie
      aliases:
        - aws:g6e.48xlarge
        - coreweave:gd-8xl40s-i128
      since: v0.1

    - name: L40S-4x
      expands:
        vendor: nvidia
        product: L40S
        architecture: ada
        formFactor: pcie
        vramGiB: 48
        capabilities: [fp8]
        gpuCount: 4
        interconnect.type: pcie
      aliases:
        - aws:g6e.12xlarge
        - aws:g6e.24xlarge
        - oci:BM.GPU.L40S.4
      since: v0.1

    - name: A100-80GB-8x
      expands:
        vendor: nvidia
        product: A100
        architecture: ampere
        formFactor: sxm
        vramGiB: 80
        mig: true
        capabilities: [mig]
        gpuCount: 8
        interconnect.type: nvswitch
        interconnect.bandwidthGBs: 600
      aliases:
        - aws:p4de.24xlarge
        - gcp:a2-ultragpu-8g
        - azure:Standard_ND96amsr_A100_v4
        - oci:BM.GPU.A100-v2.8
        - coreweave:gd-8xa100-i128
      since: v0.1
