# Default CapabilityVocabulary — installed by Modelplane.
#
# Cluster-scoped, singleton (name: default). One vocabulary per cluster — the
# InferenceClusters that declare attributes against this vocabulary are also
# cluster-scoped, so per-namespace overrides would create inconsistent
# evaluation of the same cluster's hardware semantics. Namespaces customize
# via Crossplane Compositions, not vocab redefinition.
#
# The matcher reads this CR to validate claim selectors, resolve "or-better"
# ordering, rewrite aliased keys, and validate engineFeatures strings.
apiVersion: modelplane.ai/v1alpha1
kind: CapabilityVocabulary
metadata:
  name: default
spec:
  attributeKeys:
    # ---- ordered hardware vocabulary ----
    - name: modelplane.ai/interNodeFabric
      type: orderedString
      values:
        - { name: none,                  throughputGbps: 0 }
        - { name: rocev2-100g,           throughputGbps: 100 }
        - { name: rocev2-400g,           throughputGbps: 400 }
        - { name: ib-200g,               throughputGbps: 200 }
        - { name: ib-400g,               throughputGbps: 400 }
        - { name: ib-quantum-2,          throughputGbps: 800 }
        - { name: nvlink-only-multinode, throughputGbps: 1800 }

    # ---- closed enums for stable keys ----
    - name: modelplane.ai/tier
      type: enum
      values: [{ name: production }, { name: staging }, { name: development }]
    - name: modelplane.ai/billingModel
      type: enum
      values:
        - { name: per-gpu-hour }
        - { name: per-token }
        - { name: per-request }
        - { name: provisioned-throughput }
    - name: modelplane.ai/pricing
      type: enum
      values:
        - { name: on-demand }
        - { name: spot }
        - { name: reserved }
        - { name: committed }

    # ---- free-form keys with documented conventions ----
    - name: modelplane.ai/region
      type: string
    - name: modelplane.ai/provider
      type: string
    - name: modelplane.ai/failureDomain
      type: string

    # ---- list-typed keys ----
    - name: modelplane.ai/compliance
      type: list

  engineFeatures:
    - { name: prefill-decode-disagg,  description: "Disaggregated prefill/decode (xPyD)" }
    - { name: kv-cache-routing,       description: "Prefix-aware request routing" }
    - { name: eagle-speculation,      description: "EAGLE speculative decoding" }
    - { name: draft-target-speculation, description: "Draft-target speculative decoding" }
    - { name: medusa-speculation,     description: "Medusa speculative decoding" }
    - { name: ngram-speculation,      description: "N-gram / lookahead speculation" }
    - { name: multi-lora,             description: "Multi-LoRA + LoRA-aware routing" }
    - { name: structured-output,      description: "Guided / constrained generation" }
    - { name: tool-calling,           description: "Function calling / tool-use parsing" }
    - { name: chunked-prefill,        description: "Chunked prefill with continuous batching" }
    - { name: fp8-kv-cache,           description: "FP8 KV-cache quantization" }
    - { name: mxfp4-quantization,     description: "MXFP4 weight quantization (Blackwell-native)" }
    - { name: nvfp4-quantization,     description: "NVFP4 weight quantization (NVIDIA Blackwell)" }

  kvCacheTiers:
    - { name: G1, medium: device-vram, bandwidth: "TB/s",     scope: pod-local }
    - { name: G2, medium: host-ram,    bandwidth: "100GB/s",  scope: node-local }
    - { name: G3, medium: local-ssd,   bandwidth: "10GB/s",   scope: node-local }
    - { name: G4, medium: networked,   bandwidth: "GB/s",     scope: cluster-shared }

  aliases:
    - { from: modelplane.ai/region, to: topology.kubernetes.io/region }

  # ---- instance-type macros ----
  # Customers match either on `modelplane.ai/instanceType: H100-NVL-8x-IB400`
  # or on the unpacked attributes — same predicate engine, the vocab does the
  # unpacking. Per-cloud SKU strings (`aws:p5.48xlarge`) resolve to the
  # canonical name via `aliases`. New instance types and SKU mappings land
  # here without a Modelplane CRD bump.
  instanceTypes:
    - name: H100-NVL-8x-IB400
      expands:
        gpu.nvidia.com/architecture: Hopper
        gpu.nvidia.com/productName: H100
        modelplane.ai/gpuCount: 8
        modelplane.ai/interNodeFabric: ib-400g
      aliases:
        - aws:p5.48xlarge
        - coreweave:8xH100-NVL-IB-400G
      since: v0.1

    - name: H200-NVL-8x-IB400
      expands:
        gpu.nvidia.com/architecture: Hopper
        gpu.nvidia.com/productName: H200
        modelplane.ai/gpuCount: 8
        modelplane.ai/interNodeFabric: ib-400g
      aliases:
        - aws:p5e.48xlarge
        - coreweave:8xH200-NVL-IB-400G
      since: v0.1

    - name: B200-NVL-8x-Quantum2
      expands:
        gpu.nvidia.com/architecture: Blackwell
        gpu.nvidia.com/productName: B200
        modelplane.ai/gpuCount: 8
        modelplane.ai/interNodeFabric: ib-quantum-2
      since: v0.1

    - name: MI300X-8x-RoCEv2
      expands:
        gpu.amd.com/architecture: CDNA3
        gpu.amd.com/productName: MI300X
        modelplane.ai/gpuCount: 8
        modelplane.ai/interNodeFabric: rocev2-400g
      since: v0.1
