# Kimi K2 — EU-region sibling of kimi-k2.yaml.
#
# Demonstrates multi-region spread: multiple ModelDeployments + a
# ModelEndpoint that routes across them. Same workload spec as
# kimi-k2.yaml, pinned to eu-west-1 via cloud.region.
#
# The two MDs are independent (each with its own placements and KEDA
# scaling). The ModelEndpoint (multi-region-endpoint.yaml) routes
# weighted across them, with optional region affinity at the gateway.
apiVersion: modelplane.ai/v1alpha1
kind: ModelDeployment
metadata:
  name: kimi-k2-eu
  namespace: app-team
spec:
  replicas: 1                             # KEDA writes here

  model:
    name: moonshotai/Kimi-K2-Instruct
  source: HuggingFace
  huggingFace:
    repo: moonshotai/Kimi-K2-Instruct
    revision: main
    secretRef:
      namespace: platform-system
      name: hf-token

  clusterSelector:
    matchAttributes:
      modelplane.ai/tier:    production
      cloud.region:          eu-west-1          # only difference from kimi-k2.yaml
      network.fabric:        [ib, roce]
      network.bandwidthGbps: ">=400"

  deviceSelector:
    requests:
      - name: gpus
        count: 16
        perNode: 8
        matchAttributes:
          vramGiB:           ">=141"
          capabilities:      [fp8]
          interconnect.type: nvswitch

  parallelism:
    tensor: 8
    pipeline: 2
    expert: enabled

  roles:
    prefill: { replicas: 5 }
    decode:  { replicas: 3 }

  engine:
    name: vLLM
    image: vllm/vllm-openai:v0.8.0
    args:
      - "--max-model-len=131072"
      - "--gpu-memory-utilization=0.90"
      - "--max-num-seqs=256"
      - "--distributed-executor-backend=ray"
    quantization:
      precision: fp8
      target: [weights, kvCache]
    optimizations:
      chunkedPrefill: true
      kvCacheRouting: true

  scaling:
    signal: Concurrency
    concurrency:
      minReplicas: 1
      maxReplicas: 4
      target: 32
      window: 60s
      scaleDownDelay: 600s
