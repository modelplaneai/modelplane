# Kimi K2 — frontier MoE, multi-node, disaggregated prefill/decode
#
# Demonstrates:
#   - Two-level selector cascade (federation-stage match):
#       clusterSelector: filters InferenceCluster by Cluster-layer attrs
#                        (region, fabric, bandwidth)
#       deviceSelector:  filters node pools by Pool + Device attrs (vramGiB,
#                        capabilities, interconnect). Predicates over declared
#                        pool capacity, not runtime DRA ResourceSlices.
#   - 16 devices per replica (count: 16, perNode: 8 → 2 nodes). TP=8 within a
#     node via NVLink Switch (implied by interconnect.type: nvswitch);
#     PP=2 across nodes via the cluster's IB/RoCE fabric.
#   - Parallelism: TP=8 within node, PP=2 across nodes, expert parallelism for MoE
#     (Modelplane-canonical; backend adapter translates to KServe LWS / Dynamo
#      graph / vLLM args. Matcher excludes backends that can't honor it.)
#   - 5P3D disaggregation via roles.{prefill, decode} — implies the
#     `prefill-decode-disagg` engine feature; matcher excludes backends without it.
#   - engine.optimizations: chunkedPrefill + kvCacheRouting — typed knobs that
#     imply `chunked-prefill` and `kv-cache-routing` features.
#   - FP8 weight + KV cache quantization (engine.quantization) — implies
#     `fp8-kv-cache` engine feature.
#
# Required-feature derivation. The matcher computes the set of engine
# features this MD requires from declared config:
#   roles present                                  → prefill-decode-disagg
#   engine.optimizations.chunkedPrefill: true      → chunked-prefill
#   engine.optimizations.kvCacheRouting: true      → kv-cache-routing
#   engine.quantization.target contains kvCache    → fp8-kv-cache
#   parallelism.expert: enabled                    → expert-parallelism
# Then it unions the set and matches against each candidate cluster's
# KServeBackend.spec.engine.features. Single source of truth: declare
# what you want, not which features that needs.
apiVersion: modelplane.ai/v1alpha1
kind: ModelDeployment
metadata:
  name: kimi-k2
  namespace: app-team
  labels:
    # Labels for ModelEndpoint route selection — see endpoints/multi-region.yaml.
    # Bumping the MD or replacing it stays transparent to the ME as long as
    # the new MD carries the same labels.
    modelplane.ai/model:       kimi-k2
    modelplane.ai/region:      us-east-1
    modelplane.ai/environment: production
spec:
  replicas: 1                             # KEDA writes here via scale subresource

  model:
    name: moonshotai/Kimi-K2-Instruct
  source: HuggingFace
  huggingFace:
    repo: moonshotai/Kimi-K2-Instruct
    revision: main
    secretRef:
      namespace: platform-system
      name: hf-token

  # Cluster-layer attributes (env). matchAttributes — these are spec.attributes
  # on InferenceCluster, not K8s labels on the CR object. Multi-node TP/PP
  # needs fast inter-node fabric.
  clusterSelector:
    matchAttributes:
      modelplane.ai/tier:    production
      cloud.region:          us-east-1
      network.fabric:        [ib, roce]
      network.bandwidthGbps: ">=400"

  # Pool + Device layer. Capability flags do the matching work, not
  # architecture (metadata). TP=8 within a node uses NVLink Switch — that's
  # implied by interconnect.type: nvswitch + perNode: 8 (all 8 GPUs on an
  # HGX baseboard are in one NVLink domain by construction). PP=2 spans
  # nodes via the cluster's network fabric (filtered by clusterSelector
  # above).
  #
  # Pinned to NVSwitch — vLLM's CUDA image only runs on NVIDIA. Vendor-
  # neutral matching (e.g. NVSwitch or AMD xGMI) is supported by the schema
  # but requires a ROCm-capable engine image and matching capabilities.
  deviceSelector:
    requests:
      - name: gpus
        count: 16                       # 2 nodes × 8 GPUs per replica
        perNode: 8
        matchAttributes:
          vramGiB:           ">=141"
          capabilities:      [fp8]
          interconnect.type: nvswitch

  parallelism:                          # Modelplane-canonical; backend adapter translates
    tensor: 8
    pipeline: 2
    expert: enabled

  roles:                                # 5P3D disaggregation; roles inherit root shape
    prefill: { replicas: 5 }
    decode:  { replicas: 3 }

  engine:
    name: vLLM
    image: vllm/vllm-openai:v0.8.0
    args:                               # backend adapter passes these straight through
      - "--max-model-len=131072"
      - "--gpu-memory-utilization=0.90"
      - "--max-num-seqs=256"
      - "--distributed-executor-backend=ray"
    quantization:                       # implies fp8-kv-cache feature (target=kvCache)
      precision: fp8
      target: [weights, kvCache]
    optimizations:                      # typed knobs; each implies a derived feature
      chunkedPrefill: true              # → chunked-prefill
      kvCacheRouting: true              # → kv-cache-routing (gateway prefix-aware routing)

  scaling:
    signal: Concurrency
    concurrency:
      minReplicas: 1
      maxReplicas: 4
      target: 32
      window: 60s
      scaleDownDelay: 600s
