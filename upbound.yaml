apiVersion: meta.dev.upbound.io/v2alpha1
kind: Project
metadata:
  name: modelplane
spec:
  apiDependencies:
  - k8s:
      version: v1.33.0
    type: k8s
  - git:
      path: cluster/crds
      ref: release-2.2
      repository: https://github.com/crossplane/crossplane
    type: crd
  dependsOn:
  - apiVersion: pkg.crossplane.io/v1
    kind: Provider
    package: xpkg.upbound.io/upbound/provider-gcp-container
    version: v2.5.0
  - apiVersion: pkg.crossplane.io/v1
    kind: Provider
    package: xpkg.upbound.io/upbound/provider-gcp-compute
    version: v2.5.0
  - apiVersion: pkg.crossplane.io/v1
    kind: Provider
    package: xpkg.upbound.io/upbound/provider-gcp-cloudplatform
    version: v2.5.0
  - apiVersion: pkg.crossplane.io/v1
    kind: Provider
    package: xpkg.upbound.io/upbound/provider-helm
    version: '>=v1.2.0'
  - apiVersion: pkg.crossplane.io/v1
    kind: Provider
    package: xpkg.upbound.io/upbound/provider-kubernetes
    version: '>=v1.2.0'
  - apiVersion: pkg.crossplane.io/v1
    kind: Function
    package: xpkg.upbound.io/crossplane-contrib/function-auto-ready
    version: '>=v0.0.0'
  description: This is where you can describe your project.
  license: Apache-2.0
  maintainer: Upbound User <user@example.com>
  readme: |
    This is where you can add a readme for your project.
  repository: xpkg.upbound.io/modelplane/modelplane
  source: github.com/modelplaneai/modelplane
